<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>C Store — Katalog Produk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0e0e0e;--soft-black:#161616;--card-bg:#191919;--espresso:#2B1E1A;
  --cream:#F5EDE0;--beige:#E0CEAE;--beige2:#c4aa84;--caramel:#C89B6D;
  --brown:#8f6b42;--gold:#C8A96E;--gold-glow:rgba(200,169,110,.18);
  --wa:#25D366;--grab:#00B14F;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Roboto",sans-serif;
  --display:"Bebas Neue",sans-serif;
  --topbar-h:34px;--nav-h:60px;--tabs-h:42px;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--beige);font-family:var(--sans);font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,169,110,.15);border-radius:99px}

/* ── LOADING SCREEN (#12 — loading_.txt, "REC"→"CSTORE") ── */
#loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--black);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;
  transition:opacity .6s ease,visibility .6s ease;
}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader{--c:#C8A96E;font-size:16px;position:relative;width:6em;height:6em}
.ph1{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:row;align-items:center;gap:8px;
  animation:ph1 3s ease infinite;
  clip-path:polygon(-4em -1em,4em -1em,4em 1em,-4em 1em);
}
.record{
  position:absolute;left:50%;top:50%;width:2em;height:2em;
  background:var(--c);border-radius:999px;
  animation:blink 1s step-end infinite;transform:translate(-3.5em,-50%);
}
.record-text{
  position:absolute;color:var(--c);font-family:var(--display);font-size:1.1em;font-weight:700;letter-spacing:3px;
  left:50%;top:50%;transform:translate(-0.2em,-50%);width:5em;height:1.5em;white-space:nowrap;
}
@keyframes blink{50%{opacity:0}75%{opacity:1}}
@keyframes ph1{
  25.5%{translate:0 0;clip-path:polygon(-4em -1em,4em -1em,4em 1em,-4em 1em)}
  30%,to{opacity:1;translate:0 3em;clip-path:polygon(-4em 1em,4em 1em,4em 1em,-4em 1em)}
  30.1%{opacity:0;translate:0 3em}
  92.4%,to{translate:0 0;opacity:0;clip-path:polygon(-4em -1em,4em -1em,4em 1em,-4em 1em)}
  92.5%{opacity:1;clip-path:polygon(-4em -1em,-0.5em -1em,-0.5em 1em,-4em 1em)}
  to{opacity:1;clip-path:polygon(-4em -1em,4em -1em,4em 1em,-4em 1em)}
}
.ph2{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-4em);
  width:11em;height:7em;perspective:150px;perspective-origin:50% 0%;
  transform-style:preserve-3d;animation:ph2 3s ease-in-out infinite;
}
@keyframes ph2{
  0%,15%{translate:0 4em}0%,29%{opacity:0}30%{opacity:1}40%{translate:0 0}
  50%{translate:0 0.5em;opacity:1}50.1%,to{opacity:0}
}
.laptop-b{position:absolute;left:0;right:0;bottom:0;height:.5em;background:var(--c);border-bottom-left-radius:2em;border-bottom-right-radius:2em;animation:ph2b 3s ease infinite}
.laptop-t{margin:0 1.25em;color:var(--c);transform-origin:50% 100%;animation:ph2t 3s ease infinite}
@keyframes ph2t{
  0%,29%{transform:rotateX(-10deg)}0%,41.9%{stroke-dasharray:unset}
  42%{transform:rotateX(4deg);stroke-dasharray:0 0 100}
  50%{transform:rotateX(-20deg);stroke-dasharray:0 50 0 100}
}
@keyframes ph2b{42%{scale:1 1}50%{scale:0 1}}
.icon-loader{
  position:absolute;width:4em;height:4em;background:var(--c);border-radius:999px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:icon 3s ease-in-out infinite;isolation:isolate;border-color:var(--c);border-style:solid;z-index:-1;
}
@keyframes icon{
  0%,15%{translate:0 4.5em;width:0;height:0}0%,29%{opacity:0}30%{opacity:1}
  40%{translate:0 -.75em;width:4em;height:4em}50%{translate:0 0em;opacity:1;background:var(--c)}
  50.1%{border-width:2em;background:black}65%{width:4em;height:4em;transform:translate(-50%,-50%);border-width:4px}
  80%,to{width:2em;height:2em;translate:0 0;transform:translate(-3.5em,-50%);border-width:1em;background:black}
  80.1%,to{background:var(--c)}84.9%{opacity:1}85%,to{opacity:0}
}
.icon-loader::before{
  content:"";position:absolute;top:50%;left:50%;border:.8em solid black;box-sizing:border-box;
  border-left-color:transparent!important;border-bottom-color:transparent!important;
  transform:translate(-50%,2.5em) rotate(-45deg);transform-origin:center;
  animation:iconb 3s ease-in-out infinite;z-index:-1;
}
@keyframes iconb{
  20%{transform:translate(-50%,2.5em) rotate(-45deg)}
  50%{transform:translate(-50%,-25%) rotate(-45deg);border-color:black}
  65%,to{transform:translateY(0) scale(1) scaleX(1.5) translate(-60%,-50%) rotate(45deg);border-color:var(--c)}
  85%,to{transform:translate(-40%,-50%) scale(0) scaleX(1.5) translate(-75%,-50%) rotate(45deg)}
}
.icon-loader::after{
  content:"";position:absolute;top:50%;left:50%;background:black;width:1em;height:2em;box-sizing:border-box;
  animation:icona 3s ease-in-out infinite;
}
@keyframes icona{20%{transform:translate(-50%,2.5em)}50%{transform:translate(-50%,.4em)}65%,to{transform:translate(-50%,2.5em)}}
.loading-label{font-family:var(--display);font-size:.7rem;letter-spacing:6px;color:rgba(200,169,110,.3)}

/* ── ANIMATED BG — conic drift (#5) ── */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-canvas::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 10%,rgba(200,169,110,.055) 0%,transparent 60%),
    radial-gradient(ellipse 55% 75% at 85% 90%,rgba(43,30,26,.45) 0%,transparent 60%),
    radial-gradient(ellipse 35% 35% at 55% 45%,rgba(200,169,110,.025) 0%,transparent 70%);
  animation:bgDrift 22s ease-in-out infinite;
}
.bg-canvas::after{
  content:"";position:absolute;width:800px;height:800px;left:50%;top:50%;
  transform:translate(-50%,-50%);
  background:conic-gradient(rgba(0,0,0,0) 0%,rgba(200,169,110,.04) 14%,rgba(0,0,0,0) 28%,rgba(0,0,0,0) 50%,rgba(200,169,110,.055) 64%,rgba(0,0,0,0) 78%);
  animation:bgSpin 32s linear infinite;border-radius:50%;filter:blur(45px);
}
@keyframes bgDrift{0%,100%{transform:scale(1)}40%{transform:scale(1.04) translate(18px,-12px)}75%{transform:scale(.97) translate(-12px,18px)}}
@keyframes bgSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ── LOGO WATERMARK — bigger, bounce (#1) ── */
#logo-watermark{
  position:fixed;right:-65px;bottom:-65px;
  width:460px;height:460px;z-index:1;pointer-events:none;user-select:none;
  opacity:.09;filter:blur(1px) grayscale(10%);
  animation:wmFloat 11s ease-in-out infinite;will-change:transform;
}
#logo-watermark img{width:100%;height:100%;object-fit:contain;display:block}
@keyframes wmFloat{
  0%,100%{transform:translateY(0) scale(1) rotate(-2deg)}
  35%{transform:translateY(-20px) scale(1.05) rotate(0deg)}
  70%{transform:translateY(-8px) scale(1.02) rotate(-4deg)}
}
@media(max-width:480px){#logo-watermark{width:250px;height:250px;right:-30px;bottom:-30px;opacity:.06}}

/* ── SHIMMER DIV ── */
.shimmer-div{position:relative;height:1px;overflow:hidden;background:rgba(200,169,110,.06)}
.shimmer-div::after{content:'';position:absolute;top:0;left:-55%;width:55%;height:100%;background:linear-gradient(to right,transparent,rgba(200,169,110,.38),transparent);animation:shimDiv 4s ease-in-out infinite}
@keyframes shimDiv{to{left:160%}}

/* ── TOP BAR — glassmorphism (#1 element) ── */
#top-bar{
  background:rgba(10,8,7,.4);backdrop-filter:blur(26px) saturate(1.9);-webkit-backdrop-filter:blur(26px) saturate(1.9);
  border-bottom:1px solid rgba(200,169,110,.14);
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 4px 20px rgba(0,0,0,.3);
  padding:0 1.1rem;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:201;
}
.tb-nav{display:flex;align-items:center;gap:.45rem}
.tb-back{display:inline-flex;align-items:center;gap:.32rem;font-family:var(--display);font-size:.58rem;letter-spacing:2.5px;color:rgba(200,169,110,.32);text-decoration:none;transition:color .2s}
.tb-back:hover{color:var(--gold)}
.tb-sep{font-size:.4rem;color:rgba(200,169,110,.14)}
.tb-page{font-family:var(--serif);font-style:italic;font-size:.7rem;color:rgba(200,169,110,.42)}
.tb-right{display:flex;align-items:center;gap:.5rem}
.tb-date{font-family:var(--display);font-size:.56rem;letter-spacing:2px;color:rgba(200,169,110,.2);white-space:nowrap}
@media(max-width:400px){.tb-date{display:none}}

/* GEO BADGE */
#geo-badge{
  display:none;align-items:center;gap:.28rem;
  font-family:var(--sans);font-size:.52rem;font-weight:400;letter-spacing:.3px;
  color:rgba(200,169,110,.55);background:rgba(200,169,110,.06);
  border:1px solid rgba(200,169,110,.12);border-radius:99px;padding:.15rem .55rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
}
#geo-badge.visible{display:flex}
#geo-badge:hover{background:rgba(200,169,110,.1);color:var(--gold)}

/* ── NAV — centered search (#11 — from search.txt, gold theme) ── */
#nav{
  position:sticky;top:var(--topbar-h);z-index:200;
  background:rgba(14,14,14,.52);backdrop-filter:blur(30px) saturate(1.9);-webkit-backdrop-filter:blur(30px) saturate(1.9);
  border-bottom:1px solid rgba(200,169,110,.1);
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset;
  height:var(--nav-h);display:flex;align-items:center;justify-content:center;padding:0 1rem;
}
#nav-search-wrap{
  position:relative;width:100%;max-width:520px;height:48px;
  display:flex;align-items:center;justify-content:center;
}
/* glow layer */
#search-glow{
  position:absolute;inset:0;border-radius:12px;overflow:hidden;
  filter:blur(28px);opacity:.3;z-index:0;pointer-events:none;
}
#search-glow::before{
  content:"";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(60deg);
  width:999px;height:999px;
  background:conic-gradient(#000,#4a3cb5 5%,#000 38%,#000 50%,#c84aaa 60%,#000 87%);
  animation:sRotate 7s .3s linear infinite;
}
/* border shimmer */
#search-border{
  position:absolute;inset:-1px;border-radius:12px;overflow:hidden;
  filter:blur(2.5px);z-index:0;pointer-events:none;
}
#search-border::before{
  content:"";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(83deg);
  width:600px;height:600px;
  background:conic-gradient(rgba(0,0,0,0) 0%,rgba(180,155,200,.6),rgba(0,0,0,0) 8%,rgba(0,0,0,0) 50%,rgba(200,150,200,.5),rgba(0,0,0,0) 58%);
  filter:brightness(1.3);transition:transform 2s;
}
#nav:focus-within #search-border::before{transform:translate(-50%,-50%) rotate(443deg);transition:transform 4s}
@keyframes sRotate{to{transform:translate(-50%,-50%) rotate(450deg)}}
#searchInput{
  position:relative;z-index:2;width:100%;height:100%;border-radius:10px;
  background:rgba(1,2,1,.9);border:none;
  color:var(--cream);font-family:var(--sans);font-size:.88rem;font-weight:300;
  padding:0 2.8rem 0 2.6rem;outline:none;letter-spacing:.3px;
  transition:background .2s;
}
#searchInput::placeholder{color:rgba(200,169,110,.28)}
#searchInput:focus{background:rgba(1,2,1,.98)}
.ns-icon{position:absolute;left:.9rem;z-index:3;color:rgba(200,169,110,.36);pointer-events:none}
#search-clear{position:absolute;right:2.8rem;z-index:3;color:rgba(200,169,110,.28);cursor:pointer;display:none;font-size:11px;font-family:var(--sans);transition:color .15s}
#search-clear:hover{color:var(--gold)}
#search-clear.visible{display:block}
#filter-icon-btn{
  position:absolute;right:5px;z-index:3;width:36px;height:36px;border-radius:10px;
  background:linear-gradient(180deg,#1a1529,#0d0d1a);
  border:1px solid rgba(200,169,110,.1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:border-color .2s;
}
#filter-icon-btn:hover{border-color:rgba(200,169,110,.22)}
/* pink glow inside */
#search-pink{
  position:absolute;left:0;top:8px;width:28px;height:18px;z-index:1;
  background:rgba(207,48,170,.5);filter:blur(16px);opacity:.45;
  pointer-events:none;transition:opacity 2s;
}
#nav:hover #search-pink,#nav:focus-within #search-pink{opacity:0}
#nav-result-pill{font-family:var(--serif);font-style:italic;font-size:.68rem;color:rgba(200,169,110,.28);white-space:nowrap;display:none;position:absolute;right:0;bottom:-18px;font-size:.58rem}
#nav-result-pill.visible{display:block}

/* ── TABS BAR ── */
#tabs-bar{
  position:sticky;top:calc(var(--topbar-h) + var(--nav-h));z-index:199;
  background:rgba(14,14,14,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,.07);
  height:var(--tabs-h);display:flex;align-items:stretch;
  padding:0 .6rem;overflow-x:auto;scrollbar-width:none;
}
#tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  display:flex;align-items:center;gap:.45rem;padding:0 .95rem;
  font-family:var(--display);font-size:.78rem;letter-spacing:2.5px;
  color:rgba(200,169,110,.22);background:none;border:none;border-bottom:1.5px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color .2s,border-color .2s;
}
.tab-btn:hover{color:rgba(200,169,110,.5)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-count{font-family:var(--serif);font-style:italic;font-weight:300;font-size:.66rem;color:rgba(200,169,110,.28);letter-spacing:0;transition:color .2s}
.tab-btn.active .tab-count{color:rgba(200,169,110,.52)}
#tabs-result{margin-left:auto;display:flex;align-items:center;flex-shrink:0;font-family:var(--serif);font-style:italic;font-size:.63rem;color:rgba(200,169,110,.2);padding:0 .5rem;white-space:nowrap}

/* ── FILTER STRIP ── */
#filter-strip{
  background:rgba(12,10,9,.93);border-bottom:1px solid rgba(200,169,110,.05);
  padding:.35rem .75rem;display:flex;align-items:center;gap:.28rem;
  overflow-x:auto;scrollbar-width:none;
}
#filter-strip::-webkit-scrollbar{display:none}
.f-pill{
  display:inline-flex;align-items:center;gap:.22rem;padding:.2rem .58rem;
  font-family:var(--display);font-size:.62rem;letter-spacing:1.8px;
  background:transparent;border:1px solid rgba(200,169,110,.08);border-radius:1px;
  color:rgba(200,169,110,.28);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.f-pill:hover{color:rgba(200,169,110,.58);border-color:rgba(200,169,110,.18)}
.f-pill.active{background:rgba(200,169,110,.07);border-color:rgba(200,169,110,.28);color:var(--gold)}
.f-dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.f-sep{width:1px;height:11px;background:rgba(200,169,110,.07);flex-shrink:0;margin:0 .05rem}
#vendor-pills{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#vendor-pills::-webkit-scrollbar{display:none}
#subcat-pills{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none}
#subcat-pills::-webkit-scrollbar{display:none}

/* ── ALPHA FILTER (#6) ── */
#alpha-strip{
  background:rgba(11,9,8,.9);border-bottom:1px solid rgba(200,169,110,.04);
  padding:.25rem .75rem;display:flex;align-items:center;gap:.16rem;
  overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;
}
#alpha-strip::-webkit-scrollbar{display:none}
.alpha-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:22px;height:22px;padding:0 3px;
  font-family:var(--display);font-size:.64rem;letter-spacing:.5px;
  background:transparent;border:1px solid rgba(200,169,110,.06);border-radius:1px;
  color:rgba(200,169,110,.2);cursor:pointer;transition:all .15s;flex-shrink:0;
}
.alpha-btn.has-items{color:rgba(200,169,110,.35);cursor:pointer}
.alpha-btn:not(.has-items){opacity:.2;pointer-events:none}
.alpha-btn:hover.has-items,.alpha-btn.active{color:var(--gold);border-color:rgba(200,169,110,.28);background:rgba(200,169,110,.07)}
.alpha-all{min-width:32px;font-size:.58rem;letter-spacing:1px}

/* ── PROMO SECTION (#7) ── */
#promo-section{
  background:rgba(15,11,9,.88);
  border-bottom:1px solid rgba(200,169,110,.06);
  padding:.8rem 1rem 1rem;position:relative;overflow:hidden;z-index:2;
}
#promo-section::after{
  content:"PROMO";position:absolute;right:-1rem;top:50%;transform:translateY(-50%);
  font-family:var(--display);font-size:5rem;letter-spacing:.5rem;
  color:transparent;-webkit-text-stroke:1px rgba(200,169,110,.04);
  pointer-events:none;line-height:1;
}
.promo-header{
  display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;
}
.promo-eyebrow{font-family:var(--display);font-size:.6rem;letter-spacing:4px;color:rgba(200,169,110,.4)}
.promo-line{flex:0 0 20px;height:1px;background:var(--gold);opacity:.35}
.promo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem}
@media(min-width:480px){.promo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.promo-grid{grid-template-columns:repeat(4,1fr);gap:.6rem}}
@media(min-width:1100px){.promo-grid{grid-template-columns:repeat(5,1fr)}}
.promo-card{
  background:rgba(35,22,15,.7);border:1px solid rgba(200,169,110,.08);
  border-top:2px solid rgba(200,169,110,.18);border-radius:2px;overflow:hidden;
  cursor:pointer;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s,border-color .3s;
  position:relative;
}
.promo-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5),0 0 0 1px rgba(200,169,110,.14);border-top-color:var(--gold)}
.promo-thumb{height:0;padding-bottom:75%;position:relative;overflow:hidden;background:rgba(25,16,10,.9)}
.promo-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.promo-card:hover .promo-thumb img{transform:scale(1.06)}
.promo-badge{
  position:absolute;top:.38rem;right:.38rem;background:var(--gold);color:var(--black);
  font-family:var(--display);font-size:.78rem;letter-spacing:1px;
  padding:.1rem .42rem;border-radius:2px;z-index:1;box-shadow:0 3px 10px rgba(0,0,0,.4);
}
.promo-body{padding:.5rem .62rem .62rem}
.promo-name{font-family:var(--sans);font-size:.68rem;font-weight:500;color:var(--beige);margin-bottom:.22rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.promo-price{font-family:var(--display);font-size:.95rem;color:var(--gold);letter-spacing:.5px}
.promo-old{font-family:var(--sans);font-size:.56rem;font-weight:300;color:rgba(200,169,110,.32);text-decoration:line-through;margin-left:.28rem}

/* ── CATALOG HEADER ── */
.catalog-header{padding:1.25rem 1.1rem .55rem;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(200,169,110,.06);position:relative;z-index:2}
.cat-eyebrow{display:flex;flex-direction:column;gap:.25rem}
.cat-label-small{font-family:var(--display);font-size:.55rem;letter-spacing:4px;color:rgba(200,169,110,.27)}
.cat-label-serif{font-family:var(--serif);font-weight:300;font-style:italic;font-size:1.5rem;color:var(--cream);line-height:1;letter-spacing:-.2px}
.cat-label-serif em{color:var(--gold);font-style:italic;font-weight:400}
.cat-meta{text-align:right;font-family:var(--serif);font-size:.63rem;color:rgba(200,169,110,.26);font-style:italic;line-height:1.6}
.cat-meta strong{font-family:var(--display);font-style:normal;font-size:.85rem;letter-spacing:1.5px;color:rgba(200,169,110,.42);display:block}

/* ── LAYOUT ── */
.content-wrap{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:.65rem 1rem 8rem}
@media(min-width:768px){.content-wrap{padding:.8rem 1.5rem 8rem}}
@media(min-width:1100px){.content-wrap{display:grid;grid-template-columns:190px 1fr;gap:1.2rem;padding:.95rem 2rem 8rem}}

/* ── PRODUCT GRID ── */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.38rem}
@media(min-width:480px){.product-grid{grid-template-columns:repeat(3,1fr);gap:.42rem}}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);gap:.45rem}}
@media(min-width:1100px){.product-grid{grid-template-columns:repeat(5,1fr);gap:.45rem}}
@media(min-width:1400px){.product-grid{grid-template-columns:repeat(6,1fr);gap:.5rem}}

/* ── PRODUCT CARD — with 4:3 image (#2) ── */
.product-card{
  background:var(--card-bg);border:1px solid rgba(200,169,110,.07);border-top:2px solid rgba(200,169,110,.1);
  border-radius:2px;padding:0;cursor:pointer;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  transition:border-color .25s cubic-bezier(.22,1,.36,1),border-top-color .25s,background .25s,box-shadow .25s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1);
}
.card-img-wrap{position:relative;width:100%;height:0;padding-bottom:75%;overflow:hidden;background:rgba(20,14,10,.9)}
.card-img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.22,1,.36,1),filter .3s;filter:brightness(.88)}
.product-card:hover .card-img-wrap img{transform:scale(1.06);filter:brightness(1)}
.card-body{padding:.52rem .62rem .48rem;flex:1;display:flex;flex-direction:column;gap:.22rem}
.product-card:hover{border-color:rgba(200,169,110,.17);border-top-color:var(--gold);background:rgba(28,19,15,.9);box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 0 1px rgba(200,169,110,.05);transform:translateY(-2px)}
.product-card:active{transform:translateY(0);transition-duration:.1s}
.product-card.has-stock{border-top-color:rgba(200,169,110,.24);border-left:2px solid rgba(200,169,110,.2)}
.product-card.has-stock:hover{border-top-color:var(--gold);border-left-color:var(--gold);box-shadow:0 8px 28px rgba(0,0,0,.6),-1px 0 0 var(--gold-glow),0 0 20px rgba(200,169,110,.05)}
.card-num{position:absolute;top:.38rem;right:.48rem;z-index:2;font-family:var(--serif);font-style:italic;font-weight:300;font-size:.5rem;color:rgba(200,169,110,.22);pointer-events:none}
.card-vendor{font-family:var(--display);font-size:.54rem;letter-spacing:3px;color:rgba(200,169,110,.3);line-height:1}
.has-stock .card-vendor{color:rgba(200,169,110,.46)}
.card-name{font-family:var(--sans);font-size:.7rem;font-weight:400;line-height:1.45;color:rgba(224,206,174,.65);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;letter-spacing:.02px}
.has-stock .card-name{color:var(--beige);font-weight:500}
.card-name mark{background:rgba(200,169,110,.15);color:var(--gold);border-radius:1px;padding:0 1px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:.26rem;border-top:1px solid rgba(200,169,110,.055)}
.card-stock-badge{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--display);font-size:.52rem;letter-spacing:1.8px;color:rgba(200,169,110,.2)}
.has-stock .card-stock-badge{color:rgba(200,169,110,.58)}
.badge-dot{width:4px;height:4px;border-radius:50%;background:rgba(200,169,110,.18);flex-shrink:0}
.has-stock .badge-dot{background:var(--gold);animation:stockPulse 2.4s ease-in-out infinite}
@keyframes stockPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,.5)}60%{box-shadow:0 0 0 5px rgba(200,169,110,0)}}
.card-arr{color:rgba(200,169,110,.1);transition:color .2s,transform .2s;flex-shrink:0}
.product-card:hover .card-arr{color:rgba(200,169,110,.36);transform:translateX(2px)}

/* ── SKELETON ── */
@keyframes skSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,rgba(30,20,16,.9) 25%,rgba(55,38,30,.48) 50%,rgba(30,20,16,.9) 75%);background-size:200% 100%;animation:skSlide 1.6s ease-in-out infinite;border-radius:2px}
#loading-state{display:grid;grid-template-columns:repeat(2,1fr);gap:.38rem}
@media(min-width:480px){#loading-state{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){#loading-state{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px){#loading-state{grid-template-columns:repeat(5,1fr)}}
.sk-card{height:180px}

/* ── EMPTY ── */
#empty-state{display:none;text-align:center;padding:90px 20px}
.empty-serif{font-family:var(--serif);font-size:1.6rem;font-weight:300;font-style:italic;color:rgba(224,206,174,.3);margin-bottom:.4rem}
.empty-sub{font-size:.65rem;color:rgba(200,169,110,.18);letter-spacing:.5px;margin-bottom:1.5rem;font-family:var(--display)}
.btn-reset{display:inline-flex;align-items:center;gap:.38rem;padding:.36rem .95rem;font-family:var(--display);font-size:.66rem;letter-spacing:2px;color:rgba(200,169,110,.35);border:1px solid rgba(200,169,110,.1);border-radius:1px;cursor:pointer;transition:all .2s;background:none}
.btn-reset:hover{color:var(--gold);border-color:rgba(200,169,110,.26)}

/* ── PAGINATION ── */
#pagination{display:flex;align-items:center;justify-content:center;gap:.22rem;padding:2rem .75rem .5rem;opacity:0;transition:opacity .4s}
#pagination.visible{opacity:1}
.pg-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;font-family:var(--serif);font-weight:400;font-size:.85rem;color:rgba(200,169,110,.3);background:transparent;border:1px solid rgba(200,169,110,.08);border-radius:1px;cursor:pointer;flex-shrink:0;user-select:none;transition:all .2s cubic-bezier(.22,1,.36,1)}
.pg-btn:hover:not(:disabled):not(.pg-active){color:rgba(200,169,110,.62);border-color:rgba(200,169,110,.18);background:rgba(200,169,110,.04)}
.pg-btn.pg-active{background:var(--gold);border-color:var(--gold);color:var(--black);font-weight:500;box-shadow:0 3px 10px rgba(200,169,110,.2)}
.pg-btn:disabled{opacity:.14;cursor:not-allowed;pointer-events:none}
.pg-btn.pg-arrow{font-family:var(--sans);width:26px;height:26px;border-color:rgba(200,169,110,.06);color:rgba(200,169,110,.22);font-size:.75rem}
.pg-ellipsis{font-family:var(--serif);font-style:italic;font-size:.7rem;color:rgba(200,169,110,.16);padding:0 .12rem;pointer-events:none;line-height:30px}
#pg-info{font-family:var(--serif);font-style:italic;font-size:.6rem;color:rgba(200,169,110,.18);text-align:center;padding-bottom:1.25rem;display:none}
#pg-info.visible{display:block}
.product-grid.pg-out{opacity:0;transform:translateY(5px);transition:opacity .17s ease,transform .17s ease}
.product-grid.pg-in{opacity:1;transform:translateY(0);transition:opacity .22s ease,transform .22s ease}

/* ── SIDEBAR ── */
#sidebar{display:none}
@media(min-width:1100px){
  #sidebar{display:flex;flex-direction:column;gap:.7rem;position:sticky;top:calc(var(--topbar-h) + var(--nav-h) + var(--tabs-h) + 10px);height:fit-content;max-height:calc(100vh - var(--topbar-h) - var(--nav-h) - var(--tabs-h) - 2rem);overflow-y:auto;scrollbar-width:thin}
  #filter-strip{display:none}
  .sidebar-section{background:var(--soft-black);border:1px solid rgba(200,169,110,.07);border-top:1px solid rgba(200,169,110,.12);border-radius:2px;overflow:hidden}
  .sidebar-title{font-family:var(--display);font-size:.58rem;letter-spacing:3px;color:rgba(200,169,110,.26);padding:.48rem .85rem;border-bottom:1px solid rgba(200,169,110,.06);background:rgba(200,169,110,.02)}
  .sidebar-pills{display:flex;flex-direction:column;gap:0}
  .sf-pill{display:flex;align-items:center;gap:.42rem;padding:.46rem .85rem;font-size:.68rem;font-family:var(--sans);font-weight:300;color:rgba(200,169,110,.32);cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(200,169,110,.04);background:none;border-left:none;border-right:none;border-top:none;border-radius:0;text-align:left;width:100%}
  .sf-pill:last-child{border-bottom:none}
  .sf-pill:hover{background:rgba(200,169,110,.04);color:var(--beige2)}
  .sf-pill.active{background:rgba(200,169,110,.055);color:var(--gold);border-left:1.5px solid var(--gold);padding-left:calc(.85rem - 1.5px)}
  .sf-pill-dot{width:3px;height:3px;border-radius:50%;background:rgba(200,169,110,.16);flex-shrink:0}
  .sf-pill.active .sf-pill-dot{background:var(--gold)}
}

/* ══════════════════════════════════════
   POPUP v2 — split layout (#8, #9, #10)
   Desktop: image left + info right
   Mobile: image top + info bottom
   ══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.78);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;animation:overlayIn .2s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@media(min-width:600px){.overlay{align-items:center}}

.popup{
  background:var(--soft-black);border:1px solid rgba(200,169,110,.12);
  border-top:2px solid rgba(200,169,110,.2);
  border-radius:16px 16px 0 0;
  width:100%;max-width:780px;max-height:92vh;overflow:hidden;
  display:flex;flex-direction:column;position:relative;
  animation:slideUp .28s cubic-bezier(.22,1,.36,1);
  --popup-accent:var(--gold);
}
@media(min-width:600px){
  .popup{border-radius:6px;max-height:86vh;margin:1rem;flex-direction:row;animation:popScale .28s cubic-bezier(.22,1,.36,1)}
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popScale{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* image panel */
.popup-img-panel{
  flex-shrink:0;overflow:hidden;
  width:100%;height:220px;background:#0d0a08;position:relative;
}
@media(min-width:600px){.popup-img-panel{width:300px;height:auto;border-radius:4px 0 0 4px}}
.popup-img-panel img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.popup-img-panel:hover img{transform:scale(1.04)}
.popup-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 35%,var(--popup-img-dark,rgba(0,0,0,.65)) 100%);
  pointer-events:none;
}
.popup-img-cat{
  position:absolute;top:.75rem;left:.75rem;
  font-family:var(--display);font-size:.68rem;letter-spacing:2px;
  padding:.22rem .55rem;border-radius:2px;
  background:var(--popup-accent);color:var(--black);
  box-shadow:0 3px 10px rgba(0,0,0,.5);
}

/* info panel */
.popup-info{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.popup-header{
  position:sticky;top:0;z-index:10;
  background:rgba(20,20,20,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,.07);
  padding:.9rem 1.2rem .85rem;
}
.popup-handle{width:26px;height:2px;background:rgba(200,169,110,.1);border-radius:99px;margin:0 auto .7rem}
@media(min-width:600px){.popup-handle{display:none}}
.popup-close{
  position:absolute;top:.8rem;right:.9rem;width:26px;height:26px;
  background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.1);border-radius:50%;
  color:rgba(200,169,110,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;
}
.popup-close:hover{background:rgba(200,169,110,.12);color:var(--gold)}
.popup-eyebrow{font-family:var(--display);font-size:.55rem;letter-spacing:3px;color:rgba(200,169,110,.32);margin-bottom:.32rem}
.popup-name{font-family:var(--serif);font-size:1.1rem;font-weight:400;font-style:italic;color:var(--cream);line-height:1.25;padding-right:2.2rem;letter-spacing:-.2px}
.popup-accent-line{height:1.5px;margin-top:.7rem;background:linear-gradient(to right,var(--popup-accent),transparent);border-radius:99px;opacity:.65}

.popup-body{padding:.7rem 1.2rem 1.5rem;flex:1}
.popup-no-stock{text-align:center;padding:2.5rem 0}
.popup-no-stock p{font-family:var(--serif);font-style:italic;font-size:1rem;color:rgba(200,169,110,.28);margin-top:.5rem}
.city-section{margin-bottom:.3rem}
.city-header{display:flex;align-items:center;justify-content:space-between;padding:.44rem .58rem;background:rgba(200,169,110,.03);border:1px solid rgba(200,169,110,.07);border-radius:2px;cursor:pointer;transition:background .15s,border-color .15s;user-select:none}
.city-header:hover{background:rgba(200,169,110,.06);border-color:rgba(200,169,110,.11)}
.city-header.open{background:rgba(200,169,110,.06);border-color:rgba(200,169,110,.11);border-radius:2px 2px 0 0}
.city-label{font-family:var(--display);font-size:.65rem;letter-spacing:2.5px;color:rgba(200,169,110,.42);display:flex;align-items:center;gap:.4rem}
.city-label .city-count{font-family:var(--serif);font-style:italic;font-size:.57rem;letter-spacing:0;color:rgba(200,169,110,.28)}
.city-chevron{color:rgba(200,169,110,.22);transition:transform .2s;flex-shrink:0}
.city-header.open .city-chevron{transform:rotate(180deg)}
.city-body{display:none;border:1px solid rgba(200,169,110,.06);border-top:none;border-radius:0 0 2px 2px;overflow:hidden}
.city-body.open{display:block}
/* outlet card with nearest highlight + blink (#4) */
.outlet-card{padding:.58rem .82rem;border-bottom:1px solid rgba(200,169,110,.05);transition:background .15s;position:relative}
.outlet-card:last-child{border-bottom:none}
.outlet-card:hover{background:rgba(200,169,110,.03)}
.outlet-card.is-nearest{background:rgba(200,169,110,.06);border-left:2px solid var(--popup-accent)}
.outlet-card.is-nearest::before{
  content:"📍 TERDEKAT";display:block;
  font-family:var(--display);font-size:.46rem;letter-spacing:2px;
  color:var(--popup-accent);margin-bottom:.25rem;
  animation:nearestBlink 1.6s ease-in-out infinite;
}
@keyframes nearestBlink{0%,100%{opacity:1}50%{opacity:.25}}
.outlet-name{font-family:var(--sans);font-weight:500;font-size:.73rem;color:var(--cream);margin-bottom:.12rem;letter-spacing:.2px}
.outlet-address{font-family:var(--sans);font-weight:300;font-size:.59rem;color:rgba(200,169,110,.3);line-height:1.5;margin-bottom:.44rem}
.outlet-actions{display:flex;gap:.22rem;flex-wrap:wrap}
.outlet-btn{display:inline-flex;align-items:center;gap:.18rem;padding:.2rem .48rem;border-radius:1px;font-family:var(--display);font-size:.56rem;letter-spacing:1.5px;text-decoration:none;transition:opacity .15s,transform .1s;flex-shrink:0}
.outlet-btn:hover{opacity:.82;transform:translateY(-1px)}
.btn-wa{background:var(--wa);color:#000}.btn-grab{background:var(--grab);color:#fff}
.btn-maps{background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.13);color:var(--gold)}

/* ── FAB ── */
#fab-wa-btn{position:fixed;bottom:1.5rem;right:1.25rem;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--wa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.5);animation:fabWaPulse 2.6s infinite;transition:transform .2s}
@keyframes fabWaPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.38)}70%{box-shadow:0 0 0 10px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
#fab-wa-btn:hover{transform:scale(1.07)}
#fab-wa-btn:active{transform:scale(.93)}
#fab-wa-btn svg{width:21px;height:21px;fill:white;pointer-events:none}
.hidden{display:none!important}
</style>
</head>

/* HAVERSINE + GEO (#4) */
function haversine(a,b,c,d){var R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function findNearestStore(lat,lng){var best=null,bd=Infinity;STORE_COORDS.forEach(function(s){var d=haversine(lat,lng,s.lat,s.lng);if(d<bd){bd=d;best=s}});return best?{store:best,distKm:bd}:null}

function applyGeoBadge(city,dist,store){

}
function triggerGeoFilter(){

    if(!r)return;
    var cn=CITY_MAP[r.store.city]||r.store.city;
    applyGeoBadge(cn,r.distKm,r.store.name);
  },function(){alert('Tidak bisa mendapatkan lokasi. Aktifkan izin lokasi.')},{timeout:8000,maximumAge:120000});
}
function autoGeo(){

function buildAlphaStrip(){

  var html='<button class="alpha-btn alpha-all has-items'+(currentAlpha===''?' active':'')+'" data-alpha="" onclick="setAlpha(this,\'\')">ALL</button>';
  letters.forEach(function(l){
    var has=catProds.some(function(p){return p.name.toUpperCase().startsWith(l)});
    html+='<button class="alpha-btn'+(has?' has-items':'')+(currentAlpha===l?' active':'')+'" data-alpha="'+l+'" onclick="setAlpha(this,\''+l+'\')"'+(has?'':' disabled')+'>'+l+'</button>';

}

  loading.style.display='none';
  var filtered=PRODUCTS.filter(p=>p.category===currentCat);
  if(currentSubcat!=='all')filtered=filtered.filter(p=>p.subcat===currentSubcat);
  if(currentVendor)filtered=filtered.filter(p=>p.vendor===currentVendor);
  if(currentStock==='available')filtered=filtered.filter(p=>!!STOCK[p.code]);
  if(currentStock==='empty')filtered=filtered.filter(p=>!STOCK[p.code]);
  if(currentAlpha)filtered=filtered.filter(p=>p.name.toUpperCase().startsWith(currentAlpha));
  var q=currentSearch.toLowerCase().trim();
  if(q)filtered=filtered.filter(p=>p.name.toLowerCase().includes(q)||p.code.includes(q)||(p.vendor&&p.vendor.toLowerCase().includes(q)));
  filtered.sort((a,b)=>(!!STOCK[b.code])-(!!STOCK[a.code]));
  var rp=document.getElementById('nav-result-pill');
  if(q){rp.textContent=filtered.length+' hasil';rp.classList.add('visible')}else{rp.classList.remove('visible')}
  document.getElementById('tabs-result').textContent=filtered.length.toLocaleString('id')+' produk'+(q?' — "'+currentSearch+'"':'');
  document.getElementById('catCount').textContent=(currentSearch||currentStock||currentVendor||currentSubcat!=='all'||currentAlpha)?filtered.length.toLocaleString('id'):PRODUCTS.filter(p=>p.category===currentCat).length.toLocaleString('id');
  if(!filtered.length){grid.style.display='none';noRes.style.display='block';document.getElementById('pagination').className='';document.getElementById('pagination').innerHTML='';document.getElementById('pg-info').className='';return}
  noRes.style.display='none';filteredCache=filtered;totalPages=Math.ceil(filtered.length/ITEMS_PER_PAGE);
  if(currentPage>totalPages)currentPage=1;
  renderPage(currentPage,q);renderPagination();
}

/* RENDER PAGE — cards with 4:3 image (#2) */
function renderPage(page,q){
  var grid=document.getElementById('productGrid');
  var start=(page-1)*ITEMS_PER_PAGE;
  var slice=filteredCache.slice(start,start+ITEMS_PER_PAGE);
  grid.classList.add('pg-out');grid.style.display='grid';
  requestAnimationFrame(function(){
    grid.innerHTML=slice.map(function(p,i){
      var hs=!!STOCK[p.code],cc=hs?Object.keys(STOCK[p.code]).length:0;
      var name=q?highlightText(esc(p.name),q):esc(p.name);
      var num=start+i+1;
      return`<div class="product-card${hs?' has-stock':''}" onclick="openProduct('${esc(p.code)}')" role="button" tabindex="0">
        <span class="card-num">${num}</span>
        <div class="card-img-wrap">
          <img src="${PRODUCT_IMG}" alt="${esc(p.name)}" loading="lazy">
        </div>
        <div class="card-body">
          ${p.vendor?`<div class="card-vendor">${esc(p.vendor).toUpperCase()}</div>`:''}
          <div class="card-name">${name}</div>
          <div class="card-footer">
            <div class="card-stock-badge"><span class="badge-dot"></span>${hs?cc+' KOTA':'KOSONG'}</div>
            <svg class="card-arr" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>
      </div>`;
    }).join('');
    requestAnimationFrame(function(){grid.style.opacity='1';grid.classList.remove('pg-out');grid.classList.add('pg-in');setTimeout(function(){grid.classList.remove('pg-in')},280)});
  });
}

/* PAGINATION */
function renderPagination(){
  var pg=document.getElementById('pagination'),info=document.getElementById('pg-info');
  if(totalPages<=1){pg.className='';pg.innerHTML='';info.className='';return}
  var p=currentPage,t=totalPages,html='';
  html+=`<button class="pg-btn pg-arrow" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>‹</button>`;
  buildPageRange(p,t).forEach(function(n){if(n==='…')html+=`<span class="pg-ellipsis">·</span>`;else html+=`<button class="pg-btn${n===p?' pg-active':''}" onclick="goPage(${n})">${n}</button>`});
  html+=`<button class="pg-btn pg-arrow" onclick="goPage(${p+1})" ${p>=t?'disabled':''}>›</button>`;
  pg.innerHTML=html;pg.className='visible';
  var start=(p-1)*ITEMS_PER_PAGE+1,end=Math.min(p*ITEMS_PER_PAGE,filteredCache.length);
  info.innerHTML=`<em>${start}–${end}</em> dari ${filteredCache.length.toLocaleString('id')} produk &nbsp;·&nbsp; halaman ${p} / ${t}`;info.className='visible';
}
function buildPageRange(p,t){if(t<=7){var r=[];for(var i=1;i<=t;i++)r.push(i);return r}if(p<=4)return[1,2,3,4,5,'…',t];if(p>=t-3)return[1,'…',t-4,t-3,t-2,t-1,t];return[1,'…',p-1,p,p+1,'…',t]}
function goPage(page){if(page<1||page>totalPages)return;currentPage=page;renderPage(currentPage,currentSearch.toLowerCase().trim());renderPagination();var grid=document.getElementById('productGrid');window.scrollTo({top:grid.getBoundingClientRect().top+window.scrollY-130,behavior:'smooth'})}
function highlightText(text,q){return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')}

/* COLOR THIEF — popup accent (#8) */
var _ct=null;
function getColorThief(){if(!_ct&&typeof ColorThief!=='undefined')_ct=new ColorThief();return _ct}
function applyPopupAccent(imgEl){
  var ct=getColorThief();if(!ct||!imgEl)return;
  try{
    if(!imgEl.complete||!imgEl.naturalWidth){imgEl.addEventListener('load',function(){applyPopupAccent(imgEl)},{once:true});return}
    var rgb=ct.getColor(imgEl);
    var accent='rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';
    var dark='rgba('+Math.floor(rgb[0]*.35)+','+Math.floor(rgb[1]*.35)+','+Math.floor(rgb[2]*.35)+',.88)';
    document.getElementById('popup').style.setProperty('--popup-accent',accent);
    document.getElementById('popupImgCat').style.background=accent;
    var r=rgb[0],g=rgb[1],b=rgb[2],lum=(r*299+g*587+b*114)/1000;
    document.getElementById('popupImgCat').style.color=lum>128?'#000':'#fff';
    document.getElementById('popupAccentLine').style.background='linear-gradient(to right,'+accent+',transparent)';
    document.getElementById('popupImgOverlay').style.background='linear-gradient(to bottom,transparent 35%,'+dark+' 100%)';
  }catch(e){}
}

/* OPEN PRODUCT (#8, #9, #10) */
function openProduct(code){
  var prod=PRODUCTS.find(p=>p.code===code);if(!prod)return;
  // Reset
  document.getElementById('popup').style.removeProperty('--popup-accent');
  document.getElementById('popupImgCat').style.background=document.getElementById('popupImgCat').style.color='';
  document.getElementById('popupAccentLine').style.background='linear-gradient(to right,var(--gold),transparent)';
  document.getElementById('popupImgOverlay').style.background='linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.65) 100%)';
  // Image
  var imgEl=document.getElementById('popupImg');
  imgEl.crossOrigin='anonymous';imgEl.src=PRODUCT_IMG;
  document.getElementById('popupImgPanel').style.display='block';
  if(imgEl.complete&&imgEl.naturalWidth)applyPopupAccent(imgEl);else imgEl.onload=function(){applyPopupAccent(imgEl)};
  // Category badge
  document.getElementById('popupImgCat').textContent=prod.vendor||CAT_LABELS[prod.category]||prod.category;
  // Info
  document.getElementById('popupEyebrow').textContent=CAT_LABELS[prod.category]+(prod.vendor?' — '+prod.vendor:'');
  document.getElementById('popupName').textContent=prod.name;
  // Stock
  var stockMap=STOCK[code],html='';
  if(!stockMap||!Object.keys(stockMap).length){
    html='<div class="popup-no-stock"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.2;margin-bottom:.5rem"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg><p>Tidak tersedia di semua toko</p></div>';
  }else{
    var cities=Object.keys(stockMap).sort();
    // Geo-sort: user city first (#4)
    if(userCity){
      cities.sort(function(a,b){
        var uc=userCity.toLowerCase();
        if(a.toLowerCase()===uc&&b.toLowerCase()!==uc)return -1;
        if(b.toLowerCase()===uc&&a.toLowerCase()!==uc)return 1;
        return a.localeCompare(b);
      });
    }
    html=cities.map(function(city,idx){
      var stores=stockMap[city];
      var isUserCity=userCity&&city.toLowerCase()===userCity.toLowerCase();
      var autoOpen=idx===0||isUserCity;
      var cards=stores.map(function(storeName){
        var outlet=findOutlet(storeName),addr=outlet?outlet.address:'',wa=outlet?outlet.wa:null,grab=outlet?outlet.grab:null,maps=outlet?outlet.maps:null,btns='';
        if(wa)btns+=`<a href="${wa}" target="_blank" rel="noopener" class="outlet-btn btn-wa">WA</a>`;
        if(grab)btns+=`<a href="${grab}" target="_blank" rel="noopener" class="outlet-btn btn-grab">GRAB</a>`;
        if(maps)btns+=`<a href="${maps}" target="_blank" rel="noopener" class="outlet-btn btn-maps">MAPS</a>`;
        var isNearest=!!(userNearestStore&&storeName.toLowerCase().includes(userNearestStore.toLowerCase()));
        return`<div class="outlet-card${isNearest?' is-nearest':''}">
          <div class="outlet-name">${esc(storeName)}</div>
          ${addr?`<div class="outlet-address">${esc(addr)}</div>`:''}
          ${btns?`<div class="outlet-actions">${btns}</div>`:''}
        </div>`;
      }).join('');
      return`<div class="city-section">
        <div class="city-header${autoOpen?' open':''}" onclick="toggleCity(this)">
          <div class="city-label">${esc(city)}<span class="city-count">${stores.length} toko</span></div>
          <svg class="city-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="city-body${autoOpen?' open':''}">${cards}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('popupContent').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('popup').scrollTop=0;
  document.querySelector('.popup-info').scrollTop=0;
}
function findOutlet(storeName){var sn=storeName.toLowerCase();return Object.values(OUTLETS).find(function(o){var on=o.name.toLowerCase();return on===sn||on.includes(sn)||sn.includes(on)})||null}
function toggleCity(header){var body=header.nextElementSibling,open=header.classList.contains('open');header.classList.toggle('open',!open);body.classList.toggle('open',!open)}
function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupDirect()}
function closePopupDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}

/* KEYBOARD */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closePopupDirect();
  if(e.key==='Enter'&&e.target.classList.contains('product-card'))e.target.click();
  if(!document.getElementById('overlay').classList.contains('open')){
    if(e.key==='ArrowRight')goPage(currentPage+1);
    if(e.key==='ArrowLeft')goPage(currentPage-1);
  }
});

/* SEARCH */
var searchTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimer);var val=this.value;
  document.getElementById('search-clear').classList.toggle('visible',val.length>0);
  searchTimer=setTimeout(function(){currentSearch=document.getElementById('searchInput').value;currentPage=1;renderTab()},160);
});
document.getElementById('search-clear').addEventListener('click',function(){
  document.getElementById('searchInput').value='';this.classList.remove('visible');
  document.getElementById('nav-result-pill').classList.remove('visible');
  currentSearch='';currentPage=1;renderTab();document.getElementById('searchInput').focus();
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* INIT — loading screen shows for min ~1.5s */
setTimeout(loadData,100);
autoGeo();
</script>
