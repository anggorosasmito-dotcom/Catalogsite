<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>C Store — Katalog Produk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0f0f0f;
  --soft-black:#181818;
  --espresso:#1e1410;
  --espresso2:#2a1c17;
  --cream:#f4ead9;
  --beige:#ddc9a8;
  --beige2:#c9b48e;
  --caramel:#b8895a;
  --gold:#c8a96e;
  --gold2:#a8884e;
  --muted:rgba(200,169,110,.35);
  --muted2:rgba(200,169,110,.15);
  --muted3:rgba(200,169,110,.08);
  --wa:#25D366;
  --grab:#00B14F;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"DM Sans",sans-serif;
  --display:"Bebas Neue",sans-serif;
  --nav-h:52px;
  --search-h:52px;
  --tabs-h:44px;
}
html{scroll-behavior:smooth}
body{
  background:var(--black);
  color:var(--beige);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,169,110,.2);border-radius:99px}

/* ══════════════════════════════════════
   NAV — single sticky bar
══════════════════════════════════════ */
#nav{
  position:sticky;top:0;z-index:200;
  background:rgba(15,15,15,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(30,20,16,.8);
  height:var(--nav-h);
  display:flex;align-items:center;
  padding:0 1.25rem 0 1rem;
  gap:.75rem;
}
#nav-logo{
  display:flex;align-items:center;gap:.5rem;
  text-decoration:none;flex-shrink:0;
}
#nav-logo img{
  width:36px;height:36px;object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(200,169,110,.3));
}
#nav-logo .logo-text{
  font-family:var(--display);font-size:1.1rem;letter-spacing:3px;
  color:var(--gold);display:none;
}
@media(min-width:600px){#nav-logo .logo-text{display:block}}

/* search in nav */
#nav-search{
  flex:1;position:relative;max-width:440px;
}
#nav-search input{
  width:100%;
  background:rgba(30,20,16,.7);
  border:1px solid rgba(200,169,110,.12);
  border-radius:4px;
  padding:.48rem 2rem .48rem 2.1rem;
  color:var(--cream);font-family:var(--sans);font-size:.82rem;
  outline:none;transition:border-color .2s,background .2s;
  letter-spacing:.2px;
}
#nav-search input:focus{
  border-color:rgba(200,169,110,.35);
  background:rgba(30,20,16,.95);
}
#nav-search input::placeholder{color:rgba(200,169,110,.3)}
.ns-icon{
  position:absolute;left:.6rem;top:50%;transform:translateY(-50%);
  color:rgba(200,169,110,.35);pointer-events:none;
}
#search-clear{
  position:absolute;right:.55rem;top:50%;transform:translateY(-50%);
  color:rgba(200,169,110,.35);cursor:pointer;
  display:none;padding:.15rem;
  font-size:13px;line-height:1;
  transition:color .15s;
}
#search-clear:hover{color:var(--gold)}
#search-clear.visible{display:block}

/* nav right */
#nav-right{
  display:flex;align-items:center;gap:.5rem;margin-left:auto;flex-shrink:0;
}
.nav-date{
  font-family:var(--display);font-size:.68rem;letter-spacing:1.5px;
  color:rgba(200,169,110,.3);white-space:nowrap;
}
@media(max-width:480px){.nav-date{display:none}}
.nav-back{
  font-family:var(--display);font-size:.72rem;letter-spacing:1.5px;
  color:rgba(200,169,110,.45);text-decoration:none;
  border:1px solid rgba(200,169,110,.12);
  padding:.3rem .65rem;border-radius:3px;
  transition:all .2s;white-space:nowrap;
}
.nav-back:hover{color:var(--gold);border-color:rgba(200,169,110,.35)}
@media(max-width:380px){.nav-back{display:none}}

/* ══════════════════════════════════════
   TABS BAR
══════════════════════════════════════ */
#tabs-bar{
  position:sticky;
  top:var(--nav-h);
  z-index:199;
  background:rgba(18,18,18,.97);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(30,20,16,.9);
  height:var(--tabs-h);
  display:flex;align-items:stretch;
  padding:0 .75rem;
  overflow-x:auto;
  scrollbar-width:none;
}
#tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:0 1rem;
  font-family:var(--display);font-size:.85rem;letter-spacing:2px;
  color:rgba(200,169,110,.35);
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:color .2s,border-color .2s;
}
.tab-btn:hover{color:rgba(200,169,110,.65)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-count{
  font-family:var(--sans);font-size:.58rem;font-weight:500;
  background:rgba(200,169,110,.08);
  color:rgba(200,169,110,.4);
  padding:.1rem .38rem;border-radius:99px;
}
.tab-btn.active .tab-count{
  background:rgba(200,169,110,.14);
  color:var(--gold);
}

/* tabs right: result count */
#tabs-result{
  margin-left:auto;display:flex;align-items:center;flex-shrink:0;
  font-size:.65rem;color:rgba(200,169,110,.3);letter-spacing:.5px;
  padding:0 .5rem;white-space:nowrap;
}

/* ══════════════════════════════════════
   FILTER STRIP — single row
══════════════════════════════════════ */
#filter-strip{
  background:var(--black);
  border-bottom:1px solid rgba(30,20,16,.7);
  padding:.45rem .75rem;
  display:flex;align-items:center;gap:.4rem;
  overflow-x:auto;scrollbar-width:none;
}
#filter-strip::-webkit-scrollbar{display:none}

/* stock toggle pills */
.f-pill{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.28rem .7rem;
  font-family:var(--display);font-size:.7rem;letter-spacing:1.5px;
  background:transparent;border:1px solid rgba(200,169,110,.12);border-radius:2px;
  color:rgba(200,169,110,.38);cursor:pointer;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.f-pill:hover{color:rgba(200,169,110,.7);border-color:rgba(200,169,110,.25)}
.f-pill.active{
  background:rgba(200,169,110,.1);
  border-color:rgba(200,169,110,.4);
  color:var(--gold);
}
.f-dot{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;opacity:.6;flex-shrink:0;
}

/* divider */
.f-sep{width:1px;height:16px;background:rgba(200,169,110,.08);flex-shrink:0;margin:0 .1rem}

/* vendor pills — scrollable row */
#vendor-pills{
  display:flex;gap:.35rem;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
#vendor-pills::-webkit-scrollbar{display:none}

/* subcat pills */
#subcat-pills{
  display:flex;gap:.35rem;overflow-x:auto;scrollbar-width:none;
}
#subcat-pills::-webkit-scrollbar{display:none}

/* ══════════════════════════════════════
   MAIN CONTENT AREA
══════════════════════════════════════ */
.main{
  max-width:1400px;margin:0 auto;
  padding:1rem 1rem 6rem;
}
@media(min-width:768px){.main{padding:1.25rem 1.5rem 6rem}}
@media(min-width:1200px){.main{padding:1.5rem 2rem 6rem}}

/* ══════════════════════════════════════
   PRODUCT GRID
══════════════════════════════════════ */
.product-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:.5rem;
}
@media(min-width:480px){.product-grid{grid-template-columns:repeat(3,1fr);gap:.6rem}}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);gap:.7rem}}
@media(min-width:1100px){.product-grid{grid-template-columns:repeat(5,1fr);gap:.75rem}}
@media(min-width:1400px){.product-grid{grid-template-columns:repeat(6,1fr);gap:.8rem}}

/* ── PRODUCT CARD — compact, no image ── */
.product-card{
  background:var(--soft-black);
  border:1px solid rgba(30,20,16,.95);
  border-left:3px solid rgba(30,20,16,.95);
  border-radius:4px;
  padding:.7rem .75rem .65rem;
  cursor:pointer;
  display:flex;flex-direction:column;gap:.3rem;
  transition:transform .18s,border-color .18s,box-shadow .18s,background .18s;
  position:relative;overflow:hidden;
  min-height:90px;
}
.product-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,169,110,.03) 0%,transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .2s;
}
.product-card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  background:rgba(26,18,14,.95);
}
.product-card:hover::before{opacity:1}

/* stock state */
.product-card.has-stock{
  border-left-color:var(--gold2);
  border-color:rgba(42,28,23,.8);
}
.product-card.has-stock:hover{
  border-color:rgba(200,169,110,.2);
  border-left-color:var(--gold);
  box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 0 1px rgba(200,169,110,.06);
}

/* card content */
.card-vendor{
  font-family:var(--display);
  font-size:.6rem;letter-spacing:1.8px;
  color:rgba(200,169,110,.4);
  line-height:1;
}
.has-stock .card-vendor{color:rgba(200,169,110,.55)}

.card-name{
  font-size:.75rem;line-height:1.42;
  color:var(--beige2);font-weight:400;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;
}
.has-stock .card-name{color:var(--beige)}

/* highlight from search */
.card-name mark{
  background:rgba(200,169,110,.2);
  color:var(--gold);
  border-radius:2px;padding:0 1px;
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:.15rem;
}
.card-stock-badge{
  display:inline-flex;align-items:center;gap:.28rem;
  font-family:var(--display);font-size:.58rem;letter-spacing:1.2px;
  color:rgba(200,169,110,.3);
}
.has-stock .card-stock-badge{color:var(--gold2)}
.badge-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(200,169,110,.25);flex-shrink:0;
}
.has-stock .badge-dot{background:var(--gold)}

.card-arr{
  color:rgba(200,169,110,.18);
  transition:color .2s,transform .2s;
  flex-shrink:0;
}
.product-card:hover .card-arr{
  color:rgba(200,169,110,.45);
  transform:translateX(2px);
}

/* ══════════════════════════════════════
   LOADING / EMPTY
══════════════════════════════════════ */
#loading-state{
  display:flex;align-items:center;justify-content:center;
  height:50vh;gap:.6rem;
  color:rgba(200,169,110,.35);
  font-family:var(--display);font-size:.8rem;letter-spacing:2px;
}
.spinner{
  width:14px;height:14px;
  border:1.5px solid rgba(30,20,16,.9);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

#empty-state{
  display:none;text-align:center;
  padding:80px 20px;
  color:rgba(200,169,110,.3);
}
#empty-state h3{
  font-family:var(--serif);font-size:1.3rem;
  color:var(--beige);font-weight:500;font-style:italic;
  margin-bottom:.4rem;
}
#empty-state p{font-size:.75rem;color:rgba(200,169,110,.3);margin-bottom:1.2rem}
.btn-reset{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.4rem 1rem;
  font-family:var(--display);font-size:.72rem;letter-spacing:1.5px;
  color:rgba(200,169,110,.5);
  border:1px solid rgba(200,169,110,.15);border-radius:3px;
  cursor:pointer;transition:all .2s;background:none;
}
.btn-reset:hover{color:var(--gold);border-color:rgba(200,169,110,.35)}

/* ══════════════════════════════════════
   POPUP / BOTTOM SHEET
══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center}}

.popup{
  background:var(--soft-black);
  border:1px solid rgba(30,20,16,.95);
  border-top:1px solid rgba(200,169,110,.1);
  border-radius:16px 16px 0 0;
  width:100%;max-width:560px;
  max-height:88vh;overflow-y:auto;
  padding:0 0 2.5rem;
  position:relative;
  animation:slideUp .22s cubic-bezier(.32,.72,0,1);
}
@media(min-width:600px){
  .popup{
    border-radius:10px;
    border-top:1px solid rgba(200,169,110,.1);
    max-height:82vh;
    margin:1rem;
  }
}
@keyframes slideUp{from{transform:translateY(32px);opacity:0}to{transform:translateY(0);opacity:1}}

/* popup header — sticky within popup */
.popup-header{
  position:sticky;top:0;z-index:10;
  background:var(--soft-black);
  border-bottom:1px solid rgba(30,20,16,.9);
  padding:1rem 1.25rem .85rem;
}
.popup-handle{
  width:32px;height:3px;
  background:rgba(200,169,110,.12);
  border-radius:99px;margin:0 auto .75rem;
}
@media(min-width:600px){.popup-handle{display:none}}
.popup-close{
  position:absolute;top:.85rem;right:1rem;
  width:26px;height:26px;
  background:rgba(30,20,16,.8);
  border:1px solid rgba(200,169,110,.1);border-radius:50%;
  color:rgba(200,169,110,.4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;
}
.popup-close:hover{background:rgba(200,169,110,.1);color:var(--gold)}
.popup-eyebrow{
  font-family:var(--display);font-size:.62rem;letter-spacing:2px;
  color:rgba(200,169,110,.4);margin-bottom:.25rem;
}
.popup-name{
  font-family:var(--serif);font-size:1.1rem;font-weight:500;
  color:var(--cream);line-height:1.3;padding-right:2rem;
}

/* popup body */
.popup-body{padding:.75rem 1.25rem 0}

.popup-no-stock{
  text-align:center;padding:2.5rem 0;
  color:rgba(200,169,110,.3);
}
.popup-no-stock p{
  font-family:var(--serif);font-style:italic;font-size:.95rem;
  color:rgba(200,169,110,.35);margin-top:.4rem;
}

/* city accordion */
.city-section{margin-bottom:.5rem}
.city-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem .6rem;
  background:rgba(30,20,16,.5);
  border:1px solid rgba(30,20,16,.9);
  border-radius:3px;cursor:pointer;
  transition:background .15s,border-color .15s;
  user-select:none;
}
.city-header:hover{background:rgba(42,28,23,.6);border-color:rgba(200,169,110,.1)}
.city-header.open{
  background:rgba(42,28,23,.7);
  border-color:rgba(200,169,110,.12);
  border-radius:3px 3px 0 0;
}
.city-label{
  font-family:var(--display);font-size:.72rem;letter-spacing:2.5px;
  color:rgba(200,169,110,.5);
  display:flex;align-items:center;gap:.5rem;
}
.city-label .city-count{
  font-size:.58rem;letter-spacing:0;
  background:rgba(200,169,110,.08);
  color:rgba(200,169,110,.35);
  padding:.05rem .35rem;border-radius:99px;
}
.city-open .city-label{color:var(--gold)}
.city-chevron{
  color:rgba(200,169,110,.3);
  transition:transform .2s;flex-shrink:0;
}
.city-header.open .city-chevron{transform:rotate(180deg)}

.city-body{
  display:none;
  border:1px solid rgba(200,169,110,.08);
  border-top:none;border-radius:0 0 3px 3px;
  overflow:hidden;
}
.city-body.open{display:block}

.outlet-card{
  padding:.7rem .875rem;
  border-bottom:1px solid rgba(30,20,16,.8);
  transition:background .15s;
}
.outlet-card:last-child{border-bottom:none}
.outlet-card:hover{background:rgba(30,20,16,.4)}

.outlet-name{
  font-weight:500;font-size:.8rem;
  color:var(--cream);margin-bottom:.2rem;
}
.outlet-address{
  font-size:.68rem;color:rgba(200,169,110,.4);
  line-height:1.55;margin-bottom:.55rem;
}
.outlet-actions{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
.outlet-btn{
  display:inline-flex;align-items:center;gap:.28rem;
  padding:.3rem .65rem;border-radius:3px;
  font-family:var(--display);font-size:.65rem;letter-spacing:1.2px;
  text-decoration:none;transition:opacity .15s,transform .1s;
  flex-shrink:0;
}
.outlet-btn:hover{opacity:.85;transform:translateY(-1px)}
.outlet-btn:active{transform:translateY(0)}
.btn-wa{background:var(--wa);color:#000}
.btn-grab{background:var(--grab);color:#fff}
.btn-maps{
  background:rgba(200,169,110,.1);
  border:1px solid rgba(200,169,110,.15);
  color:var(--gold);
}

/* ══════════════════════════════════════
   DESKTOP SIDEBAR LAYOUT (≥ 1100px)
══════════════════════════════════════ */
@media(min-width:1100px){
  .content-wrap{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:1.5rem;
    max-width:1400px;
    margin:0 auto;
    padding:1.5rem 2rem 6rem;
  }
  .main{padding:0;max-width:none}
  
  #sidebar{
    display:flex;flex-direction:column;gap:1rem;
    position:sticky;top:calc(var(--nav-h) + var(--tabs-h) + 8px);
    height:fit-content;
    max-height:calc(100vh - var(--nav-h) - var(--tabs-h) - 2rem);
    overflow-y:auto;scrollbar-width:thin;
  }
  
  .sidebar-section{
    background:var(--soft-black);
    border:1px solid rgba(30,20,16,.9);
    border-radius:4px;overflow:hidden;
  }
  .sidebar-title{
    font-family:var(--display);font-size:.65rem;letter-spacing:2px;
    color:rgba(200,169,110,.35);
    padding:.6rem .85rem;
    border-bottom:1px solid rgba(30,20,16,.9);
    background:rgba(30,20,16,.4);
  }
  .sidebar-pills{
    display:flex;flex-direction:column;gap:0;
  }
  .sf-pill{
    display:flex;align-items:center;gap:.5rem;
    padding:.55rem .85rem;
    font-size:.75rem;color:rgba(200,169,110,.45);
    cursor:pointer;transition:all .15s;
    border-bottom:1px solid rgba(30,20,16,.6);
    background:none;border-left:none;border-right:none;border-top:none;
    border-radius:0;text-align:left;width:100%;
    font-family:var(--sans);
  }
  .sf-pill:last-child{border-bottom:none}
  .sf-pill:hover{background:rgba(30,20,16,.5);color:var(--beige2)}
  .sf-pill.active{
    background:rgba(200,169,110,.06);
    color:var(--gold);
    border-left:2px solid var(--gold);
    padding-left:calc(.85rem - 2px);
  }
  .sf-pill-dot{
    width:5px;height:5px;border-radius:50%;
    background:rgba(200,169,110,.2);flex-shrink:0;
  }
  .sf-pill.active .sf-pill-dot{background:var(--gold)}

  /* hide mobile filter strip on desktop */
  #filter-strip{display:none}
}

/* hide sidebar on mobile/tablet */
#sidebar{display:none}
@media(min-width:1100px){#sidebar{display:flex}}

/* ══════════════════════════════════════
   UTIL
══════════════════════════════════════ */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav id="nav">
  <a id="nav-logo" href="https://cstore.id" aria-label="C Store">
    <img src="https://res.cloudinary.com/dpjw4tqqn/image/upload/v1777522252/21_zmbhhv.png" alt="C Store" onerror="this.style.display='none'">
    <span class="logo-text">C STORE</span>
  </a>

  <div id="nav-search">
    <svg class="ns-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Cari produk, brand, kode..." autocomplete="off" spellcheck="false">
    <span id="search-clear" title="Hapus">✕</span>
  </div>

  <div id="nav-right">
    <span class="nav-date" id="navDate"></span>
    <a href="https://cstore.id" class="nav-back">← KEMBALI</a>
  </div>
</nav>

<!-- ── TABS ── -->
<div id="tabs-bar">
  <button class="tab-btn active" data-cat="e-cigarette" onclick="switchTab('e-cigarette')">
    E-CIGARETTE <span class="tab-count" id="count-e-cigarette">—</span>
  </button>
  <button class="tab-btn" data-cat="cigarette" onclick="switchTab('cigarette')">
    CIGARETTE <span class="tab-count" id="count-cigarette">—</span>
  </button>
  <button class="tab-btn" data-cat="pregnancy" onclick="switchTab('pregnancy')">
    PREGNANCY TEST <span class="tab-count" id="count-pregnancy">—</span>
  </button>
  <span id="tabs-result"></span>
</div>

<!-- ── MOBILE/TABLET FILTER STRIP ── -->
<div id="filter-strip">
  <!-- stock pills -->
  <button class="f-pill active" data-stock="" onclick="setStock(this,'')">
    <span class="f-dot"></span>SEMUA
  </button>
  <button class="f-pill" data-stock="available" onclick="setStock(this,'available')">
    <span class="f-dot"></span>TERSEDIA
  </button>

    <span class="f-dot"></span>KOSONG
  </button>

  <div class="f-sep"></div>

  <!-- subcat pills (e-cig only) -->
  <div id="subcat-pills" style="display:flex;gap:.35rem"></div>

  <div class="f-sep" id="vendor-sep"></div>

  <!-- vendor pills -->
  <div id="vendor-pills"></div>
</div>

<!-- ── DESKTOP LAYOUT WRAPPER ── -->
<div class="content-wrap">

  <!-- SIDEBAR (desktop only) -->
  <aside id="sidebar">
    <!-- Stock filter -->
    <div class="sidebar-section">
      <div class="sidebar-title">STOK</div>
      <div class="sidebar-pills">
        <button class="sf-pill active" data-type="stock" data-val="" onclick="setSidebarFilter(this,'stock','')">
          <span class="sf-pill-dot"></span>Semua
        </button>
        <button class="sf-pill" data-type="stock" data-val="available" onclick="setSidebarFilter(this,'stock','available')">
          <span class="sf-pill-dot"></span>Tersedia
        </button>
        <button class="sf-pill" data-type="stock" data-val="empty" onclick="setSidebarFilter(this,'stock','empty')">
          <span class="sf-pill-dot"></span>Stok Kosong
        </button>
      </div>
    </div>

    <!-- Subcat (e-cig only) -->
    <div class="sidebar-section" id="sb-subcat-wrap">
      <div class="sidebar-title">KATEGORI</div>
      <div class="sidebar-pills" id="sb-subcat-pills"></div>
    </div>

    <!-- Vendor filter -->
    <div class="sidebar-section">
      <div class="sidebar-title">BRAND</div>
      <div class="sidebar-pills" id="sb-vendor-pills"></div>
    </div>
  </aside>

  <!-- MAIN GRID -->
  <main class="main">
    <div id="loading-state">
      <div class="spinner"></div>
      <span>MEMUAT PRODUK</span>
    </div>
    <div class="product-grid" id="productGrid" style="display:none"></div>
    <div id="empty-state">
      <h3>Produk tidak ditemukan</h3>
      <p>Coba kata kunci atau filter yang berbeda</p>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.1"/></svg>
        RESET SEMUA FILTER
      </button>
    </div>
  </main>

</div><!-- /content-wrap -->

<!-- ── POPUP ── -->
<div class="overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup" id="popup" role="dialog" aria-modal="true">
    <div class="popup-header">
      <div class="popup-handle"></div>
      <button class="popup-close" onclick="closePopupDirect()" aria-label="Tutup">✕</button>
      <div class="popup-eyebrow" id="popupEyebrow"></div>
      <div class="popup-name" id="popupName"></div>
    </div>
    <div class="popup-body" id="popupContent"></div>
  </div>
</div>

<script>
// ── STATE ──
var PRODUCTS=[],STOCK={},OUTLETS={};
var currentCat='e-cigarette',currentSubcat='all',currentSearch='',currentVendor='',currentStock='';
var allLoaded=false;

// ── SUBCATS ──
var SUBCATS=[
  {key:'device',label:'DEVICE / POD',re:/pod|kit|disposable|xlim|xros|nexlim|vuse|relx|foom|joiway|oxva|voopoo|vaporesso|smok|aspire|uwell|dragbar|lost.?vape|geekvape|drag|argus|aegis/i},
  {key:'liquid',label:'LIQUID',re:/\d+ml|\d+mg|salt|freebase|liquid|liq|juice/i},
  {key:'cartridge',label:'CARTRIDGE / COIL',re:/cartridge|coil|ohm|pod.?cart/i},
  {key:'hnb',label:'HNB / TEREA',re:/terea|heets|iqos|hnb/i},
];
function detectSubcat(n){for(var s of SUBCATS)if(s.re.test(n))return s.key;return'other'}

var CAT_LABELS={'e-cigarette':'E-Cigarette','cigarette':'Cigarette','pregnancy':'Pregnancy Test'};
var TOP_VENDORS=['Foom','Oxva','Movi','Juta','Djoy','Relx','Trilogy','Crackz','American','Vuse','Lost Vape','Dway','Rokbar','Nixx','Terea','Xros','Tickets','Lunar','Lokaal','Makna','Hero57','Blackwood','Lcv','Buaqita'];

var CS_IMG='https://res.cloudinary.com/dpjw4tqqn/image/upload/v1779098094/Materi_Promosi_12_zapttv.jpg';

// ── DATE ──
(function(){
  var d=new Date();
  var m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  document.getElementById('navDate').textContent=d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
})();

// ── BASE PATH ──
var BASE=(function(){
  var p=location.pathname.replace(/\/[^/]*$/,'');
  return(p===''||p==='/')?'/':p+'/';
})();

// ── LOAD DATA ──
async function loadData(){
  try{
    var[p,s,o]=await Promise.all([
      fetch(BASE+'data/products.json').then(r=>r.json()),
      fetch(BASE+'data/stock.json').then(r=>r.json()),
      fetch(BASE+'data/outlets.json').then(r=>r.json()),
    ]);
    PRODUCTS=p;STOCK=s;
    o.forEach(x=>{OUTLETS[x.store_code]=x});
    PRODUCTS.forEach(p=>{p.subcat=p.category==='e-cigarette'?detectSubcat(p.name):null});
    // counts
    ['e-cigarette','cigarette','pregnancy'].forEach(cat=>{
      document.getElementById('count-'+cat).textContent=
        PRODUCTS.filter(p=>p.category===cat).length.toLocaleString('id');
    });
    buildFilters();
    allLoaded=true;
    renderTab();
  }catch(e){
    document.getElementById('loading-state').innerHTML=
      '<span style="color:rgba(200,80,80,.7);font-family:var(--display);letter-spacing:2px">GAGAL MEMUAT DATA</span>';
    console.error(e);
  }
}

// ── BUILD FILTER UI ──
function buildFilters(){
  buildVendorPills();
  buildSubcatPills();
  buildSidebarSubcat();
  buildSidebarVendors();
}

function buildVendorPills(){
  var container=document.getElementById('vendor-pills');
  var html=`<button class="f-pill active" data-vendor="" onclick="setVendor(this,'')">SEMUA BRAND</button>`;
  TOP_VENDORS.forEach(v=>{
    html+=`<button class="f-pill" data-vendor="${esc(v)}" onclick="setVendor(this,'${esc(v)}')">${esc(v).toUpperCase()}</button>`;
  });
  container.innerHTML=html;
}

function buildSubcatPills(){
  var container=document.getElementById('subcat-pills');
  var pills=[{key:'all',label:'SEMUA'},...SUBCATS,{key:'other',label:'LAINNYA'}];
  container.innerHTML=pills.map(s=>
    `<button class="f-pill${s.key===currentSubcat?' active':''}" data-subcat="${s.key}" onclick="setSubcat(this,'${s.key}')">${s.label}</button>`
  ).join('');
  // show/hide
  var show=currentCat==='e-cigarette';
  container.style.display=show?'flex':'none';
  document.getElementById('vendor-sep').style.display=show?'block':'none';
}

function buildSidebarSubcat(){
  var wrap=document.getElementById('sb-subcat-wrap');
  var container=document.getElementById('sb-subcat-pills');
  if(currentCat!=='e-cigarette'){wrap.style.display='none';return}
  wrap.style.display='block';
  var pills=[{key:'all',label:'Semua'},...SUBCATS.map(s=>({key:s.key,label:s.label.replace(/ \/ /g,' / ')})),{key:'other',label:'Lainnya'}];
  container.innerHTML=pills.map(s=>
    `<button class="sf-pill${s.key===currentSubcat?' active':''}" data-type="subcat" data-val="${s.key}" onclick="setSidebarFilter(this,'subcat','${s.key}')">`+
    `<span class="sf-pill-dot"></span>${s.label}</button>`
  ).join('');
}

function buildSidebarVendors(){
  var container=document.getElementById('sb-vendor-pills');
  var html=`<button class="sf-pill${currentVendor===''?' active':''}" data-type="vendor" data-val="" onclick="setSidebarFilter(this,'vendor','')"><span class="sf-pill-dot"></span>Semua Brand</button>`;
  TOP_VENDORS.forEach(v=>{
    html+=`<button class="sf-pill${currentVendor===v?' active':''}" data-type="vendor" data-val="${esc(v)}" onclick="setSidebarFilter(this,'vendor','${esc(v)}')"><span class="sf-pill-dot"></span>${v}</button>`;
  });
  container.innerHTML=html;
}

// ── TAB SWITCH ──
function switchTab(cat){
  currentCat=cat;currentSubcat='all';currentSearch='';currentVendor='';currentStock='';
  document.getElementById('searchInput').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  // reset stock pills
  document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===''));
  // rebuild filters for new cat
  buildSubcatPills();
  buildSidebarSubcat();
  // reset vendor
  document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===''));
  document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  renderTab();
}

// ── FILTER SETTERS ──
function setStock(el,val){
  currentStock=val;
  document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===val));
  // sync sidebar
  document.querySelectorAll('[data-type="stock"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  renderTab();
}

function setSubcat(el,val){
  currentSubcat=val;
  document.querySelectorAll('[data-subcat]').forEach(b=>b.classList.toggle('active',b.dataset.subcat===val));
  document.querySelectorAll('[data-type="subcat"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  renderTab();
}

function setVendor(el,val){
  currentVendor=val;
  document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===val));
  document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  renderTab();
}

function setSidebarFilter(el,type,val){
  if(type==='stock') setStock(el,val);
  else if(type==='subcat') setSubcat(el,val);
  else if(type==='vendor') setVendor(el,val);
}

function resetAll(){
  currentSubcat='all';currentSearch='';currentVendor='';currentStock='';
  document.getElementById('searchInput').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===''));
  document.querySelectorAll('[data-type="stock"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  document.querySelectorAll('[data-subcat]').forEach(b=>b.classList.toggle('active',b.dataset.subcat==='all'));
  document.querySelectorAll('[data-type="subcat"]').forEach(b=>b.classList.toggle('active',b.dataset.val==='all'));
  document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===''));
  document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  renderTab();
}

// ── RENDER ──
function renderTab(){
  if(!allLoaded)return;
  var grid=document.getElementById('productGrid');
  var loading=document.getElementById('loading-state');
  var noRes=document.getElementById('empty-state');
  loading.style.display='none';

  var filtered=PRODUCTS.filter(p=>p.category===currentCat);
  if(currentSubcat!=='all')filtered=filtered.filter(p=>p.subcat===currentSubcat);
  if(currentVendor)filtered=filtered.filter(p=>p.vendor===currentVendor);
  if(currentStock==='available')filtered=filtered.filter(p=>!!STOCK[p.code]);
  if(currentStock==='empty')filtered=filtered.filter(p=>!STOCK[p.code]);

  var q=currentSearch.toLowerCase().trim();
  if(q){
    filtered=filtered.filter(p=>
      p.name.toLowerCase().includes(q)||
      p.code.includes(q)||
      (p.vendor&&p.vendor.toLowerCase().includes(q))
    );
  }

  // result count
  var info=filtered.length.toLocaleString('id')+' produk'+(q?' untuk "'+currentSearch+'"':'');
  document.getElementById('tabs-result').textContent=info;

  if(!filtered.length){
    grid.style.display='none';noRes.style.display='block';return;
  }
  noRes.style.display='none';

  // sort: stock first
  filtered.sort((a,b)=>(!!STOCK[b.code])-(!!STOCK[a.code]));

  grid.innerHTML=filtered.map(p=>{
    var hs=!!STOCK[p.code];
    var cc=hs?Object.keys(STOCK[p.code]).length:0;
    var name=q?highlightText(esc(p.name),q):esc(p.name);
    return`<div class="product-card${hs?' has-stock':''}" onclick="openProduct('${esc(p.code)}')" role="button" tabindex="0">
      ${p.vendor?`<div class="card-vendor">${esc(p.vendor).toUpperCase()}</div>`:''}
      <div class="card-name">${name}</div>
      <div class="card-footer">
        <div class="card-stock-badge">
          <span class="badge-dot"></span>
          ${hs?cc+' KOTA':'KOSONG'}
        </div>
        <svg class="card-arr" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>`;
  }).join('');
  grid.style.display='grid';
}

function highlightText(text,q){
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

// ── OPEN PRODUCT POPUP ──
function openProduct(code){
  var prod=PRODUCTS.find(p=>p.code===code);if(!prod)return;
  document.getElementById('popupEyebrow').textContent=
    CAT_LABELS[prod.category]+(prod.vendor?' — '+prod.vendor:'');
  document.getElementById('popupName').textContent=prod.name;

  var stockMap=STOCK[code];
  var html='';

  if(!stockMap||!Object.keys(stockMap).length){
    html=`<div class="popup-no-stock">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:.25;margin-bottom:.4rem"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
      <p>Tidak tersedia di semua toko saat ini</p>
    </div>`;
  }else{
    var cities=Object.keys(stockMap).sort();
    html=cities.map(function(city,idx){
      var stores=stockMap[city];
      var cards=stores.map(function(storeName){
        var outlet=findOutlet(storeName);
        var addr=outlet?outlet.address:'';
        var wa=outlet?outlet.wa:null;
        var grab=outlet?outlet.grab:null;
        var maps=outlet?outlet.maps:null;
        var btns='';
        if(wa) btns+=`<a href="${wa}" target="_blank" rel="noopener" class="outlet-btn btn-wa">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WHATSAPP</a>`;
        if(grab) btns+=`<a href="${grab}" target="_blank" rel="noopener" class="outlet-btn btn-grab">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          GRAB MART</a>`;
        if(maps) btns+=`<a href="${maps}" target="_blank" rel="noopener" class="outlet-btn btn-maps">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          MAPS</a>`;
        return`<div class="outlet-card">
          <div class="outlet-name">${esc(storeName)}</div>
          ${addr?`<div class="outlet-address">${esc(addr)}</div>`:''}
          ${btns?`<div class="outlet-actions">${btns}</div>`:''}
        </div>`;
      }).join('');
      // first city open by default
      var isOpen=idx===0;
      return`<div class="city-section">
        <div class="city-header${isOpen?' open':''}" onclick="toggleCity(this)">
          <div class="city-label">
            ${esc(city)}
            <span class="city-count">${stores.length} toko</span>
          </div>
          <svg class="city-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="city-body${isOpen?' open':''}">${cards}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('popupContent').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  // scroll popup to top
  document.getElementById('popup').scrollTop=0;
}

function findOutlet(storeName){
  var sn=storeName.toLowerCase();
  return Object.values(OUTLETS).find(function(o){
    var on=o.name.toLowerCase();
    return on===sn||on.includes(sn)||sn.includes(on);
  })||null;
}

function toggleCity(header){
  var body=header.nextElementSibling;
  var open=header.classList.contains('open');
  header.classList.toggle('open',!open);
  body.classList.toggle('open',!open);
}

// ── POPUP CLOSE ──
function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupDirect()}
function closePopupDirect(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePopupDirect()});

// keyboard support for cards
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.classList.contains('product-card')){
    e.target.click();
  }
});

// ── SEARCH ──
var searchTimer;
var searchInput=document.getElementById('searchInput');
var searchClear=document.getElementById('search-clear');

searchInput.addEventListener('input',function(){
  clearTimeout(searchTimer);
  var val=this.value;
  searchClear.classList.toggle('visible',val.length>0);
  searchTimer=setTimeout(function(){
    currentSearch=searchInput.value;
    renderTab();
  },180);
});

searchClear.addEventListener('click',function(){
  searchInput.value='';
  searchClear.classList.remove('visible');
  currentSearch='';
  renderTab();
  searchInput.focus();
});

// ── ESCAPE ──
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
