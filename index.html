<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>C Store — Katalog Produk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0e0e0e;
  --soft-black:#161616;
  --card-bg:#191919;
  --espresso:#2B1E1A;
  --cream:#F5EDE0;
  --beige:#E0CEAE;
  --beige2:#c4aa84;
  --caramel:#C89B6D;
  --brown:#8f6b42;
  --gold:#C8A96E;
  --gold-glow:rgba(200,169,110,.18);
  --wa:#25D366;
  --grab:#00B14F;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"DM Sans",sans-serif;
  --display:"Bebas Neue",sans-serif;
  --topbar-h:34px;
  --nav-h:52px;
  --tabs-h:42px;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--beige);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,169,110,.15);border-radius:99px}

/* ── LOGO WATERMARK ── */
#logo-watermark{
  position:fixed;right:-45px;bottom:-45px;
  width:300px;height:300px;
  z-index:1;pointer-events:none;user-select:none;
  opacity:.06;
  filter:blur(1.5px) grayscale(20%);
  animation:wmFloat 12s ease-in-out infinite;
  will-change:transform;
}
#logo-watermark img{width:100%;height:100%;object-fit:contain;display:block}
@keyframes wmFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.03)}}
@media(max-width:480px){#logo-watermark{width:180px;height:180px;right:-20px;bottom:-20px;opacity:.045}}

/* ── SHIMMER DIV ── */
.shimmer-div{position:relative;height:1px;overflow:hidden;background:rgba(200,169,110,.06)}
.shimmer-div::after{content:'';position:absolute;top:0;left:-55%;width:55%;height:100%;background:linear-gradient(to right,transparent,rgba(200,169,110,.38),transparent);animation:shimDiv 4s ease-in-out infinite}
@keyframes shimDiv{to{left:160%}}

/* ── TOP BAR ── */
#top-bar{
  background:rgba(10,8,7,.78);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);
  border-bottom:1px solid rgba(200,169,110,.07);
  padding:0 1.25rem 0 1.1rem;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:201;
}
.tb-nav{display:flex;align-items:center;gap:.45rem}
.tb-back{
  display:inline-flex;align-items:center;gap:.32rem;
  font-family:var(--display);font-size:.58rem;letter-spacing:2.5px;
  color:rgba(200,169,110,.32);text-decoration:none;transition:color .2s;
}
.tb-back:hover{color:var(--gold)}
.tb-sep{font-size:.4rem;color:rgba(200,169,110,.14)}
.tb-page{font-family:var(--serif);font-style:italic;font-size:.7rem;color:rgba(200,169,110,.42);letter-spacing:.3px}
.tb-date{font-family:var(--display);font-size:.56rem;letter-spacing:2px;color:rgba(200,169,110,.2);white-space:nowrap}
@media(max-width:400px){.tb-date{display:none}}

/* ── NAV ── */
#nav{
  position:sticky;top:var(--topbar-h);z-index:200;
  background:rgba(14,14,14,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(200,169,110,.08);
  height:var(--nav-h);display:flex;align-items:center;padding:0 1.1rem;gap:.65rem;
}
#nav-search{flex:1;position:relative;max-width:520px}
#nav-search input{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid rgba(200,169,110,.11);border-radius:0;
  padding:.4rem 2.4rem .4rem 1.75rem;
  color:var(--cream);font-family:var(--serif);font-size:.95rem;font-style:italic;font-weight:300;
  outline:none;transition:border-color .25s;letter-spacing:.3px;
}
#nav-search input:focus{border-bottom-color:rgba(200,169,110,.36)}
#nav-search input::placeholder{color:rgba(200,169,110,.2);font-style:italic}
.ns-icon{position:absolute;left:.05rem;top:50%;transform:translateY(-50%);color:rgba(200,169,110,.26);pointer-events:none}
#search-clear{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);color:rgba(200,169,110,.26);cursor:pointer;display:none;font-size:11px;line-height:1;transition:color .15s;font-family:var(--sans)}
#search-clear:hover{color:var(--gold)}
#search-clear.visible{display:block}
#nav-result-pill{flex-shrink:0;font-family:var(--serif);font-style:italic;font-size:.68rem;color:rgba(200,169,110,.28);letter-spacing:.2px;white-space:nowrap;display:none}
#nav-result-pill.visible{display:block}

/* ── TABS BAR ── */
#tabs-bar{
  position:sticky;top:calc(var(--topbar-h) + var(--nav-h));z-index:199;
  background:rgba(14,14,14,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,.07);
  height:var(--tabs-h);display:flex;align-items:stretch;
  padding:0 .6rem;overflow-x:auto;scrollbar-width:none;
}
#tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  display:flex;align-items:center;gap:.45rem;padding:0 .95rem;
  font-family:var(--display);font-size:.78rem;letter-spacing:2.5px;
  color:rgba(200,169,110,.22);
  background:none;border:none;border-bottom:1.5px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color .2s,border-color .2s;
}
.tab-btn:hover{color:rgba(200,169,110,.5)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-count{font-family:var(--serif);font-style:italic;font-weight:300;font-size:.66rem;color:rgba(200,169,110,.28);letter-spacing:0;transition:color .2s}
.tab-btn.active .tab-count{color:rgba(200,169,110,.52)}
#tabs-result{margin-left:auto;display:flex;align-items:center;flex-shrink:0;font-family:var(--serif);font-style:italic;font-size:.63rem;color:rgba(200,169,110,.2);letter-spacing:.2px;padding:0 .5rem;white-space:nowrap}

/* ── FILTER STRIP ── */
#filter-strip{
  background:rgba(12,10,9,.93);border-bottom:1px solid rgba(200,169,110,.05);
  padding:.35rem .75rem;display:flex;align-items:center;gap:.28rem;
  overflow-x:auto;scrollbar-width:none;
}
#filter-strip::-webkit-scrollbar{display:none}
.f-pill{
  display:inline-flex;align-items:center;gap:.22rem;padding:.2rem .58rem;
  font-family:var(--display);font-size:.62rem;letter-spacing:1.8px;
  background:transparent;border:1px solid rgba(200,169,110,.08);border-radius:1px;
  color:rgba(200,169,110,.28);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.f-pill:hover{color:rgba(200,169,110,.58);border-color:rgba(200,169,110,.18)}
.f-pill.active{background:rgba(200,169,110,.07);border-color:rgba(200,169,110,.28);color:var(--gold)}
.f-dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.f-sep{width:1px;height:11px;background:rgba(200,169,110,.07);flex-shrink:0;margin:0 .05rem}
#vendor-pills{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#vendor-pills::-webkit-scrollbar{display:none}
#subcat-pills{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none}
#subcat-pills::-webkit-scrollbar{display:none}

/* ── CATALOG HEADER ── */
.catalog-header{
  padding:1.25rem 1.1rem .55rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:1px solid rgba(200,169,110,.06);
  position:relative;z-index:2;
}
.cat-eyebrow{display:flex;flex-direction:column;gap:.25rem}
.cat-label-small{font-family:var(--display);font-size:.55rem;letter-spacing:4px;color:rgba(200,169,110,.27)}
.cat-label-serif{font-family:var(--serif);font-weight:300;font-style:italic;font-size:1.5rem;color:var(--cream);line-height:1;letter-spacing:-.2px}
.cat-label-serif em{color:var(--gold);font-style:italic;font-weight:400}
.cat-meta{text-align:right;font-family:var(--serif);font-size:.63rem;color:rgba(200,169,110,.26);font-style:italic;line-height:1.6}
.cat-meta strong{font-family:var(--display);font-style:normal;font-size:.85rem;letter-spacing:1.5px;color:rgba(200,169,110,.42);display:block}

/* ── LAYOUT ── */
.content-wrap{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:.65rem 1rem 8rem}
@media(min-width:768px){.content-wrap{padding:.8rem 1.5rem 8rem}}
@media(min-width:1100px){.content-wrap{display:grid;grid-template-columns:190px 1fr;gap:1.2rem;padding:.95rem 2rem 8rem}}

/* ── PRODUCT GRID ── */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.38rem}
@media(min-width:480px){.product-grid{grid-template-columns:repeat(3,1fr);gap:.42rem}}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);gap:.45rem}}
@media(min-width:1100px){.product-grid{grid-template-columns:repeat(5,1fr);gap:.45rem}}
@media(min-width:1400px){.product-grid{grid-template-columns:repeat(6,1fr);gap:.5rem}}

/* ── PRODUCT CARD — Luxury Dark Retail ── */
.product-card{
  background:var(--card-bg);
  border:1px solid rgba(200,169,110,.07);
  border-top:2px solid rgba(200,169,110,.1);
  border-radius:2px;
  padding:.72rem .78rem .66rem;
  cursor:pointer;display:flex;flex-direction:column;gap:.3rem;
  position:relative;overflow:hidden;min-height:94px;
  transition:border-color .25s cubic-bezier(.22,1,.36,1),border-top-color .25s,background .25s,box-shadow .25s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1);
}
.product-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(to bottom,rgba(200,169,110,.022),transparent);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.product-card:hover{
  border-color:rgba(200,169,110,.17);border-top-color:var(--gold);
  background:rgba(28,19,15,.9);
  box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 0 1px rgba(200,169,110,.05);
  transform:translateY(-2px);
}
.product-card:hover::before{opacity:1}
.product-card:active{transform:translateY(0);transition-duration:.1s}

.product-card.has-stock{
  border-top-color:rgba(200,169,110,.24);
  border-left:2px solid rgba(200,169,110,.2);
}
.product-card.has-stock:hover{
  border-top-color:var(--gold);border-left-color:var(--gold);
  box-shadow:0 8px 28px rgba(0,0,0,.6),-1px 0 0 var(--gold-glow),0 0 20px rgba(200,169,110,.05);
}

/* item number */
.card-num{
  position:absolute;top:.52rem;right:.62rem;
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:.55rem;color:rgba(200,169,110,.1);letter-spacing:.5px;line-height:1;pointer-events:none;
}

/* vendor */
.card-vendor{font-family:var(--display);font-size:.54rem;letter-spacing:3px;color:rgba(200,169,110,.3);line-height:1}
.has-stock .card-vendor{color:rgba(200,169,110,.46)}

/* name */
.card-name{
  font-family:var(--sans);font-size:.74rem;line-height:1.5;
  color:rgba(224,206,174,.68);font-weight:400;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;letter-spacing:.04px;
}
.has-stock .card-name{color:var(--beige);font-weight:500}
.card-name mark{background:rgba(200,169,110,.15);color:var(--gold);border-radius:1px;padding:0 1px}

/* footer */
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:.06rem;padding-top:.3rem;
  border-top:1px solid rgba(200,169,110,.055);
}
.card-stock-badge{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--display);font-size:.52rem;letter-spacing:1.8px;color:rgba(200,169,110,.2)}
.has-stock .card-stock-badge{color:rgba(200,169,110,.58)}
.badge-dot{width:4px;height:4px;border-radius:50%;background:rgba(200,169,110,.18);flex-shrink:0}
.has-stock .badge-dot{background:var(--gold);animation:stockPulse 2.4s ease-in-out infinite}
@keyframes stockPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,.5)}60%{box-shadow:0 0 0 5px rgba(200,169,110,0)}}
.card-arr{color:rgba(200,169,110,.1);transition:color .2s,transform .2s;flex-shrink:0}
.product-card:hover .card-arr{color:rgba(200,169,110,.36);transform:translateX(2px)}

/* ── SKELETON ── */
@keyframes skSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,rgba(30,20,16,.9) 25%,rgba(55,38,30,.48) 50%,rgba(30,20,16,.9) 75%);background-size:200% 100%;animation:skSlide 1.6s ease-in-out infinite;border-radius:2px}
#loading-state{display:grid;grid-template-columns:repeat(2,1fr);gap:.38rem}
@media(min-width:480px){#loading-state{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){#loading-state{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px){#loading-state{grid-template-columns:repeat(5,1fr)}}
.sk-card{height:94px}

/* ── EMPTY ── */
#empty-state{display:none;text-align:center;padding:90px 20px}
.empty-serif{font-family:var(--serif);font-size:1.6rem;font-weight:300;font-style:italic;color:rgba(224,206,174,.3);margin-bottom:.4rem;letter-spacing:-.2px}
.empty-sub{font-size:.65rem;color:rgba(200,169,110,.18);letter-spacing:.5px;margin-bottom:1.5rem;font-family:var(--display)}
.btn-reset{display:inline-flex;align-items:center;gap:.38rem;padding:.36rem .95rem;font-family:var(--display);font-size:.66rem;letter-spacing:2px;color:rgba(200,169,110,.35);border:1px solid rgba(200,169,110,.1);border-radius:1px;cursor:pointer;transition:all .2s;background:none}
.btn-reset:hover{color:var(--gold);border-color:rgba(200,169,110,.26)}

/* ── PAGINATION ── */
#pagination{display:flex;align-items:center;justify-content:center;gap:.22rem;padding:2rem .75rem .5rem;opacity:0;transition:opacity .4s}
#pagination.visible{opacity:1}
.pg-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;
  font-family:var(--serif);font-weight:400;font-size:.85rem;letter-spacing:.3px;
  color:rgba(200,169,110,.3);background:transparent;
  border:1px solid rgba(200,169,110,.08);border-radius:1px;
  cursor:pointer;flex-shrink:0;user-select:none;
  transition:all .2s cubic-bezier(.22,1,.36,1);
}
.pg-btn:hover:not(:disabled):not(.pg-active){color:rgba(200,169,110,.62);border-color:rgba(200,169,110,.18);background:rgba(200,169,110,.04)}
.pg-btn.pg-active{background:var(--gold);border-color:var(--gold);color:var(--black);font-weight:500;box-shadow:0 3px 10px rgba(200,169,110,.2)}
.pg-btn:disabled{opacity:.14;cursor:not-allowed;pointer-events:none}
.pg-btn.pg-arrow{font-family:var(--sans);width:26px;height:26px;border-color:rgba(200,169,110,.06);color:rgba(200,169,110,.22);font-size:.75rem}
.pg-btn.pg-arrow:hover:not(:disabled){border-color:rgba(200,169,110,.16);color:rgba(200,169,110,.52);background:rgba(200,169,110,.04)}
.pg-ellipsis{font-family:var(--serif);font-style:italic;font-size:.7rem;color:rgba(200,169,110,.16);padding:0 .12rem;pointer-events:none;line-height:30px}
#pg-info{font-family:var(--serif);font-style:italic;font-size:.6rem;color:rgba(200,169,110,.18);text-align:center;padding-bottom:1.25rem;letter-spacing:.2px;display:none}
#pg-info.visible{display:block}
.product-grid.pg-out{opacity:0;transform:translateY(5px);transition:opacity .17s ease,transform .17s ease}
.product-grid.pg-in{opacity:1;transform:translateY(0);transition:opacity .22s ease,transform .22s ease}

/* ── SIDEBAR ── */
#sidebar{display:none}
@media(min-width:1100px){
  #sidebar{display:flex;flex-direction:column;gap:.7rem;position:sticky;top:calc(var(--topbar-h) + var(--nav-h) + var(--tabs-h) + 10px);height:fit-content;max-height:calc(100vh - var(--topbar-h) - var(--nav-h) - var(--tabs-h) - 2rem);overflow-y:auto;scrollbar-width:thin}
  #filter-strip{display:none}
  .sidebar-section{background:var(--soft-black);border:1px solid rgba(200,169,110,.07);border-top:1px solid rgba(200,169,110,.12);border-radius:2px;overflow:hidden}
  .sidebar-title{font-family:var(--display);font-size:.58rem;letter-spacing:3px;color:rgba(200,169,110,.26);padding:.48rem .85rem;border-bottom:1px solid rgba(200,169,110,.06);background:rgba(200,169,110,.02)}
  .sidebar-pills{display:flex;flex-direction:column;gap:0}
  .sf-pill{display:flex;align-items:center;gap:.42rem;padding:.46rem .85rem;font-size:.68rem;color:rgba(200,169,110,.32);cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(200,169,110,.04);background:none;border-left:none;border-right:none;border-top:none;border-radius:0;text-align:left;width:100%;font-family:var(--sans);font-weight:300}
  .sf-pill:last-child{border-bottom:none}
  .sf-pill:hover{background:rgba(200,169,110,.04);color:var(--beige2)}
  .sf-pill.active{background:rgba(200,169,110,.055);color:var(--gold);border-left:1.5px solid var(--gold);padding-left:calc(.85rem - 1.5px)}
  .sf-pill-dot{width:3px;height:3px;border-radius:50%;background:rgba(200,169,110,.16);flex-shrink:0}
  .sf-pill.active .sf-pill-dot{background:var(--gold)}
}

/* ── POPUP ── */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center}}
.popup{background:var(--soft-black);border:1px solid rgba(200,169,110,.1);border-top:2px solid rgba(200,169,110,.18);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:0 0 2.5rem;position:relative;animation:slideUp .26s cubic-bezier(.22,1,.36,1)}
@media(min-width:600px){.popup{border-radius:5px;max-height:82vh;margin:1rem}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.popup-header{position:sticky;top:0;z-index:10;background:var(--soft-black);border-bottom:1px solid rgba(200,169,110,.07);padding:1rem 1.25rem .9rem}
.popup-handle{width:26px;height:2px;background:rgba(200,169,110,.1);border-radius:99px;margin:0 auto .75rem}
@media(min-width:600px){.popup-handle{display:none}}
.popup-close{position:absolute;top:.9rem;right:1rem;width:24px;height:24px;background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.09);border-radius:50%;color:rgba(200,169,110,.32);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.popup-close:hover{background:rgba(200,169,110,.1);color:var(--gold)}
.popup-eyebrow{font-family:var(--display);font-size:.56rem;letter-spacing:3px;color:rgba(200,169,110,.32);margin-bottom:.35rem}
.popup-name{font-family:var(--serif);font-size:1.2rem;font-weight:400;font-style:italic;color:var(--cream);line-height:1.25;padding-right:2rem;letter-spacing:-.2px}
.popup-body{padding:.75rem 1.25rem 0}
.popup-no-stock{text-align:center;padding:2.5rem 0}
.popup-no-stock p{font-family:var(--serif);font-style:italic;font-size:1rem;color:rgba(200,169,110,.28);margin-top:.5rem}
.city-section{margin-bottom:.32rem}
.city-header{display:flex;align-items:center;justify-content:space-between;padding:.46rem .6rem;background:rgba(200,169,110,.03);border:1px solid rgba(200,169,110,.07);border-radius:2px;cursor:pointer;transition:background .15s,border-color .15s;user-select:none}
.city-header:hover{background:rgba(200,169,110,.06);border-color:rgba(200,169,110,.11)}
.city-header.open{background:rgba(200,169,110,.06);border-color:rgba(200,169,110,.11);border-radius:2px 2px 0 0}
.city-label{font-family:var(--display);font-size:.66rem;letter-spacing:2.5px;color:rgba(200,169,110,.42);display:flex;align-items:center;gap:.42rem}
.city-label .city-count{font-family:var(--serif);font-style:italic;font-size:.58rem;letter-spacing:0;color:rgba(200,169,110,.28)}
.city-chevron{color:rgba(200,169,110,.22);transition:transform .2s;flex-shrink:0}
.city-header.open .city-chevron{transform:rotate(180deg)}
.city-body{display:none;border:1px solid rgba(200,169,110,.06);border-top:none;border-radius:0 0 2px 2px;overflow:hidden}
.city-body.open{display:block}
.outlet-card{padding:.62rem .875rem;border-bottom:1px solid rgba(200,169,110,.05);transition:background .15s}
.outlet-card:last-child{border-bottom:none}
.outlet-card:hover{background:rgba(200,169,110,.03)}
.outlet-name{font-weight:500;font-size:.76rem;color:var(--cream);margin-bottom:.16rem;letter-spacing:.2px}
.outlet-address{font-size:.62rem;color:rgba(200,169,110,.3);line-height:1.55;margin-bottom:.48rem}
.outlet-actions{display:flex;gap:.25rem;flex-wrap:wrap}
.outlet-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.23rem .52rem;border-radius:1px;font-family:var(--display);font-size:.58rem;letter-spacing:1.5px;text-decoration:none;transition:opacity .15s,transform .1s;flex-shrink:0}
.outlet-btn:hover{opacity:.82;transform:translateY(-1px)}
.btn-wa{background:var(--wa);color:#000}
.btn-grab{background:var(--grab);color:#fff}
.btn-maps{background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.13);color:var(--gold)}

/* ── FAB ── */
#fab-wa-btn{position:fixed;bottom:1.5rem;right:1.25rem;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--wa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.5);animation:fabWaPulse 2.6s infinite;transition:transform .2s}
@keyframes fabWaPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.38)}70%{box-shadow:0 0 0 10px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
#fab-wa-btn:hover{transform:scale(1.07)}
#fab-wa-btn:active{transform:scale(.93)}
#fab-wa-btn svg{width:21px;height:21px;fill:white;pointer-events:none}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="logo-watermark" aria-hidden="true">
  <img src="https://res.cloudinary.com/dpjw4tqqn/image/upload/v1777522252/21_zmbhhv.png" alt="">
</div>

<div id="top-bar">
  <nav class="tb-nav">
    <a href="https://test.landing.dutrasa.com/" class="tb-back">
      <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      BERANDA
    </a>
    <span class="tb-sep">›</span>
    <span class="tb-page">Katalog Produk</span>
  </nav>
  <span class="tb-date" id="navDate"></span>
</div>

<div class="shimmer-div"></div>

<div id="nav">
  <div id="nav-search">
    <svg class="ns-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Cari produk, brand, kode…" autocomplete="off" spellcheck="false">
    <span id="search-clear" title="Hapus">✕</span>
  </div>
  <span id="nav-result-pill"></span>
</div>

<div id="tabs-bar">
  <button class="tab-btn active" data-cat="e-cigarette" onclick="switchTab('e-cigarette')">E-CIGARETTE <span class="tab-count" id="count-e-cigarette">—</span></button>
  <button class="tab-btn" data-cat="cigarette" onclick="switchTab('cigarette')">CIGARETTE <span class="tab-count" id="count-cigarette">—</span></button>
  <button class="tab-btn" data-cat="pregnancy" onclick="switchTab('pregnancy')">PREGNANCY TEST <span class="tab-count" id="count-pregnancy">—</span></button>
  <span id="tabs-result"></span>
</div>

<div id="filter-strip">
  <button class="f-pill active" data-stock="" onclick="setStock(this,'')"><span class="f-dot"></span>SEMUA</button>
  <button class="f-pill" data-stock="available" onclick="setStock(this,'available')"><span class="f-dot"></span>TERSEDIA</button>
  <button class="f-pill" data-stock="empty" onclick="setStock(this,'empty')"><span class="f-dot"></span>KOSONG</button>
  <div class="f-sep"></div>
  <div id="subcat-pills" style="display:flex;gap:.25rem"></div>
  <div class="f-sep" id="vendor-sep"></div>
  <div id="vendor-pills"></div>
</div>

<div class="catalog-header">
  <div class="cat-eyebrow">
    <span class="cat-label-small">C STORE · KOLEKSI PRODUK</span>
    <span class="cat-label-serif" id="catLabelSerif"><em>E-Cigarette</em></span>
  </div>
  <div class="cat-meta">
    <strong id="catCount">—</strong>
    total produk
  </div>
</div>

<div class="content-wrap">
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">STOK</div>
      <div class="sidebar-pills">
        <button class="sf-pill active" data-type="stock" data-val="" onclick="setSidebarFilter(this,'stock','')"><span class="sf-pill-dot"></span>Semua</button>
        <button class="sf-pill" data-type="stock" data-val="available" onclick="setSidebarFilter(this,'stock','available')"><span class="sf-pill-dot"></span>Tersedia</button>
        <button class="sf-pill" data-type="stock" data-val="empty" onclick="setSidebarFilter(this,'stock','empty')"><span class="sf-pill-dot"></span>Stok Kosong</button>
      </div>
    </div>
    <div class="sidebar-section" id="sb-subcat-wrap">
      <div class="sidebar-title">KATEGORI</div>
      <div class="sidebar-pills" id="sb-subcat-pills"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">BRAND</div>
      <div class="sidebar-pills" id="sb-vendor-pills"></div>
    </div>
  </aside>

  <main>
    <div id="loading-state">
      <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
      <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
      <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
      <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
    </div>
    <div class="product-grid" id="productGrid" style="display:none;opacity:0"></div>
    <div id="empty-state">
      <div class="empty-serif">Tidak ditemukan</div>
      <div class="empty-sub">COBA KATA KUNCI ATAU FILTER LAIN</div>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.1"/></svg>RESET FILTER
      </button>

    <div id="pagination"></div>
    <div id="pg-info"></div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup" id="popup" role="dialog" aria-modal="true">
    <div class="popup-header">
      <div class="popup-handle"></div>

      <div class="popup-name" id="popupName"></div>

  </div>
</div>

  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</button>

<script>
var PRODUCTS=[],STOCK={},OUTLETS={};
var currentCat='e-cigarette',currentSubcat='all',currentSearch='',currentVendor='',currentStock='';
var allLoaded=false;
var ITEMS_PER_PAGE=30,currentPage=1,totalPages=1;
var filteredCache=[];

var SUBCATS=[
  {key:'device',label:'Device / Pod',re:/pod|kit|disposable|xlim|xros|nexlim|vuse|relx|foom|joiway|oxva|voopoo|vaporesso|smok|aspire|uwell|dragbar|lost.?vape|geekvape|drag|argus|aegis/i},
  {key:'liquid',label:'Liquid',re:/\d+ml|\d+mg|salt|freebase|liquid|liq|juice/i},
  {key:'cartridge',label:'Cartridge / Coil',re:/cartridge|coil|ohm|pod.?cart/i},
  {key:'hnb',label:'HNB / Terea',re:/terea|heets|iqos|hnb/i},
];
function detectSubcat(n){for(var s of SUBCATS)if(s.re.test(n))return s.key;return'other'}

var CAT_LABELS={'e-cigarette':'E-Cigarette','cigarette':'Cigarette','pregnancy':'Pregnancy Test'};
var CAT_SERIF={'e-cigarette':'<em>E-Cigarette</em>','cigarette':'<em>Cigarette</em>','pregnancy':'<em>Pregnancy Test</em>'};
var TOP_VENDORS=['Foom','Oxva','Movi','Juta','Djoy','Relx','Trilogy','Crackz','American','Vuse','Lost Vape','Dway','Rokbar','Nixx','Terea','Xros','Tickets','Lunar','Lokaal','Makna','Hero57','Blackwood','Lcv','Buaqita'];

(function(){var d=new Date(),m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];document.getElementById('navDate').textContent=d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear()})();

var BASE=(function(){var p=location.pathname.replace(/\/[^/]*$/,'');return(p===''||p==='/')?'/':p+'/'})();

async function loadData(){
  try{
    var[p,s,o]=await Promise.all([
      fetch(BASE+'data/products.json').then(r=>r.json()),
      fetch(BASE+'data/stock.json').then(r=>r.json()),
      fetch(BASE+'data/outlets.json').then(r=>r.json()),
    ]);
    PRODUCTS=p;STOCK=s;
    o.forEach(x=>{OUTLETS[x.store_code]=x});
    PRODUCTS.forEach(p=>{p.subcat=p.category==='e-cigarette'?detectSubcat(p.name):null});
    ['e-cigarette','cigarette','pregnancy'].forEach(cat=>{
      document.getElementById('count-'+cat).textContent=PRODUCTS.filter(p=>p.category===cat).length.toLocaleString('id');
    });
    buildFilters();allLoaded=true;renderTab();
  }catch(e){
    document.getElementById('loading-state').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:4rem 1rem;font-family:var(--serif);font-style:italic;font-size:1rem;color:rgba(200,80,80,.35)">Gagal memuat data</div>';
    console.error(e);
  }
}

function buildFilters(){buildVendorPills();buildSubcatPills();buildSidebarSubcat();buildSidebarVendors()}
function buildVendorPills(){
  var c=document.getElementById('vendor-pills');
  var h='<button class="f-pill active" data-vendor="" onclick="setVendor(this,\'\')">SEMUA</button>';
  TOP_VENDORS.forEach(v=>{h+=`<button class="f-pill" data-vendor="${esc(v)}" onclick="setVendor(this,'${esc(v)}')">${esc(v).toUpperCase()}</button>`});
  c.innerHTML=h;
}
function buildSubcatPills(){
  var c=document.getElementById('subcat-pills');
  var pills=[{key:'all',label:'SEMUA'},...SUBCATS.map(s=>({key:s.key,label:s.label.toUpperCase()})),{key:'other',label:'LAINNYA'}];
  c.innerHTML=pills.map(s=>`<button class="f-pill${s.key===currentSubcat?' active':''}" data-subcat="${s.key}" onclick="setSubcat(this,'${s.key}')">${s.label}</button>`).join('');
  var show=currentCat==='e-cigarette';
  c.style.display=show?'flex':'none';
  document.getElementById('vendor-sep').style.display=show?'block':'none';
}
function buildSidebarSubcat(){
  var wrap=document.getElementById('sb-subcat-wrap'),c=document.getElementById('sb-subcat-pills');
  if(currentCat!=='e-cigarette'){wrap.style.display='none';return}
  wrap.style.display='block';
  var pills=[{key:'all',label:'Semua'},...SUBCATS,{key:'other',label:'Lainnya'}];
  c.innerHTML=pills.map(s=>`<button class="sf-pill${s.key===currentSubcat?' active':''}" data-type="subcat" data-val="${s.key}" onclick="setSidebarFilter(this,'subcat','${s.key}')"><span class="sf-pill-dot"></span>${s.label}</button>`).join('');
}
function buildSidebarVendors(){
  var c=document.getElementById('sb-vendor-pills');
  var h=`<button class="sf-pill${currentVendor===''?' active':''}" data-type="vendor" data-val="" onclick="setSidebarFilter(this,'vendor','')"><span class="sf-pill-dot"></span>Semua Brand</button>`;
  TOP_VENDORS.forEach(v=>{h+=`<button class="sf-pill${currentVendor===v?' active':''}" data-type="vendor" data-val="${esc(v)}" onclick="setSidebarFilter(this,'vendor','${esc(v)}')"><span class="sf-pill-dot"></span>${v}</button>`});
  c.innerHTML=h;
}

function switchTab(cat){
  currentCat=cat;currentSubcat='all';currentSearch='';currentVendor='';currentStock='';currentPage=1;
  document.getElementById('searchInput').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('nav-result-pill').classList.remove('visible');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===''));
  document.getElementById('catLabelSerif').innerHTML=CAT_SERIF[cat];
  buildSubcatPills();buildSidebarSubcat();
  document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===''));
  document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  renderTab();
}
function setStock(el,val){currentStock=val;currentPage=1;document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===val));document.querySelectorAll('[data-type="stock"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));renderTab()}
function setSubcat(el,val){currentSubcat=val;currentPage=1;document.querySelectorAll('[data-subcat]').forEach(b=>b.classList.toggle('active',b.dataset.subcat===val));document.querySelectorAll('[data-type="subcat"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));renderTab()}
function setVendor(el,val){currentVendor=val;currentPage=1;document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===val));document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===val));renderTab()}
function setSidebarFilter(el,type,val){if(type==='stock')setStock(el,val);else if(type==='subcat')setSubcat(el,val);else if(type==='vendor')setVendor(el,val)}
function resetAll(){
  currentSubcat='all';currentSearch='';currentVendor='';currentStock='';currentPage=1;
  document.getElementById('searchInput').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('nav-result-pill').classList.remove('visible');
  document.querySelectorAll('[data-stock]').forEach(b=>b.classList.toggle('active',b.dataset.stock===''));
  document.querySelectorAll('[data-type="stock"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  document.querySelectorAll('[data-subcat]').forEach(b=>b.classList.toggle('active',b.dataset.subcat==='all'));
  document.querySelectorAll('[data-type="subcat"]').forEach(b=>b.classList.toggle('active',b.dataset.val==='all'));
  document.querySelectorAll('[data-vendor]').forEach(b=>b.classList.toggle('active',b.dataset.vendor===''));
  document.querySelectorAll('[data-type="vendor"]').forEach(b=>b.classList.toggle('active',b.dataset.val===''));
  renderTab();
}

function renderTab(){
  if(!allLoaded)return;
  var grid=document.getElementById('productGrid'),loading=document.getElementById('loading-state'),noRes=document.getElementById('empty-state');
  loading.style.display='none';
  var filtered=PRODUCTS.filter(p=>p.category===currentCat);
  if(currentSubcat!=='all')filtered=filtered.filter(p=>p.subcat===currentSubcat);
  if(currentVendor)filtered=filtered.filter(p=>p.vendor===currentVendor);
  if(currentStock==='available')filtered=filtered.filter(p=>!!STOCK[p.code]);
  if(currentStock==='empty')filtered=filtered.filter(p=>!STOCK[p.code]);
  var q=currentSearch.toLowerCase().trim();
  if(q)filtered=filtered.filter(p=>p.name.toLowerCase().includes(q)||p.code.includes(q)||(p.vendor&&p.vendor.toLowerCase().includes(q)));
  filtered.sort((a,b)=>(!!STOCK[b.code])-(!!STOCK[a.code]));

  var rp=document.getElementById('nav-result-pill');
  if(q){rp.textContent=filtered.length+' hasil';rp.classList.add('visible')}else{rp.classList.remove('visible')}

  document.getElementById('tabs-result').textContent=filtered.length.toLocaleString('id')+' produk'+(q?' — "'+currentSearch+'"':'');
  document.getElementById('catCount').textContent=(currentSearch||currentStock||currentVendor||currentSubcat!=='all')?filtered.length.toLocaleString('id'):PRODUCTS.filter(p=>p.category===currentCat).length.toLocaleString('id');

  if(!filtered.length){
    grid.style.display='none';noRes.style.display='block';
    document.getElementById('pagination').className='';document.getElementById('pagination').innerHTML='';document.getElementById('pg-info').className='';return;
  }
  noRes.style.display='none';
  filteredCache=filtered;totalPages=Math.ceil(filtered.length/ITEMS_PER_PAGE);
  if(currentPage>totalPages)currentPage=1;
  renderPage(currentPage,q);renderPagination();
}

function renderPage(page,q){
  var grid=document.getElementById('productGrid');
  var start=(page-1)*ITEMS_PER_PAGE;
  var slice=filteredCache.slice(start,start+ITEMS_PER_PAGE);
  grid.classList.add('pg-out');grid.style.display='grid';
  requestAnimationFrame(function(){
    grid.innerHTML=slice.map(function(p,i){
      var hs=!!STOCK[p.code],cc=hs?Object.keys(STOCK[p.code]).length:0;
      var name=q?highlightText(esc(p.name),q):esc(p.name);
      var num=start+i+1;
      return`<div class="product-card${hs?' has-stock':''}" onclick="openProduct('${esc(p.code)}')" role="button" tabindex="0">
        <span class="card-num">${num}</span>
        ${p.vendor?`<div class="card-vendor">${esc(p.vendor).toUpperCase()}</div>`:''}
        <div class="card-name">${name}</div>
        <div class="card-footer">
          <div class="card-stock-badge"><span class="badge-dot"></span>${hs?cc+' KOTA':'KOSONG'}</div>
          <svg class="card-arr" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;
    }).join('');
    requestAnimationFrame(function(){
      grid.style.opacity='1';grid.classList.remove('pg-out');grid.classList.add('pg-in');
      setTimeout(function(){grid.classList.remove('pg-in')},280);
    });
  });
}

function renderPagination(){
  var pg=document.getElementById('pagination'),info=document.getElementById('pg-info');
  if(totalPages<=1){pg.className='';pg.innerHTML='';info.className='';return}
  var p=currentPage,t=totalPages,html='';
  html+=`<button class="pg-btn pg-arrow" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>‹</button>`;
  buildPageRange(p,t).forEach(function(n){
    if(n==='…')html+=`<span class="pg-ellipsis">·</span>`;
    else html+=`<button class="pg-btn${n===p?' pg-active':''}" onclick="goPage(${n})">${n}</button>`;
  });
  html+=`<button class="pg-btn pg-arrow" onclick="goPage(${p+1})" ${p>=t?'disabled':''}>›</button>`;
  pg.innerHTML=html;pg.className='visible';
  var start=(p-1)*ITEMS_PER_PAGE+1,end=Math.min(p*ITEMS_PER_PAGE,filteredCache.length);
  info.innerHTML=`<em>${start}–${end}</em> dari ${filteredCache.length.toLocaleString('id')} produk &nbsp;·&nbsp; halaman ${p} / ${t}`;
  info.className='visible';
}

function buildPageRange(p,t){
  if(t<=7){var r=[];for(var i=1;i<=t;i++)r.push(i);return r}
  if(p<=4)return[1,2,3,4,5,'…',t];
  if(p>=t-3)return[1,'…',t-4,t-3,t-2,t-1,t];
  return[1,'…',p-1,p,p+1,'…',t];
}

function goPage(page){
  if(page<1||page>totalPages)return;
  currentPage=page;
  renderPage(currentPage,currentSearch.toLowerCase().trim());renderPagination();
  var grid=document.getElementById('productGrid');
  window.scrollTo({top:grid.getBoundingClientRect().top+window.scrollY-130,behavior:'smooth'});
}

function highlightText(text,q){return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')}

function openProduct(code){
  var prod=PRODUCTS.find(p=>p.code===code);if(!prod)return;
  document.getElementById('popupEyebrow').textContent=CAT_LABELS[prod.category]+(prod.vendor?' — '+prod.vendor:'');
  document.getElementById('popupName').textContent=prod.name;
  var stockMap=STOCK[code],html='';
  if(!stockMap||!Object.keys(stockMap).length){
    html='<div class="popup-no-stock"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.2;margin-bottom:.5rem"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg><p>Tidak tersedia di semua toko</p></div>';
  }else{
    var cities=Object.keys(stockMap).sort();
    html=cities.map(function(city,idx){
      var stores=stockMap[city];
      var cards=stores.map(function(storeName){
        var outlet=findOutlet(storeName),addr=outlet?outlet.address:'',wa=outlet?outlet.wa:null,grab=outlet?outlet.grab:null,maps=outlet?outlet.maps:null,btns='';
        if(wa)btns+=`<a href="${wa}" target="_blank" rel="noopener" class="outlet-btn btn-wa">WA</a>`;
        if(grab)btns+=`<a href="${grab}" target="_blank" rel="noopener" class="outlet-btn btn-grab">GRAB</a>`;
        if(maps)btns+=`<a href="${maps}" target="_blank" rel="noopener" class="outlet-btn btn-maps">MAPS</a>`;
        return`<div class="outlet-card"><div class="outlet-name">${esc(storeName)}</div>${addr?`<div class="outlet-address">${esc(addr)}</div>`:''} ${btns?`<div class="outlet-actions">${btns}</div>`:''}</div>`;
      }).join('');
      return`<div class="city-section"><div class="city-header${idx===0?' open':''}" onclick="toggleCity(this)"><div class="city-label">${esc(city)}<span class="city-count">${stores.length} toko</span></div><svg class="city-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div><div class="city-body${idx===0?' open':''}">${cards}</div></div>`;
    }).join('');
  }
  document.getElementById('popupContent').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('popup').scrollTop=0;
}

function findOutlet(storeName){var sn=storeName.toLowerCase();return Object.values(OUTLETS).find(function(o){var on=o.name.toLowerCase();return on===sn||on.includes(sn)||sn.includes(on)})||null}
function toggleCity(header){var body=header.nextElementSibling,open=header.classList.contains('open');header.classList.toggle('open',!open);body.classList.toggle('open',!open)}
function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupDirect()}
function closePopupDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closePopupDirect();
  if(e.key==='Enter'&&e.target.classList.contains('product-card'))e.target.click();
  if(!document.getElementById('overlay').classList.contains('open')){
    if(e.key==='ArrowRight')goPage(currentPage+1);
    if(e.key==='ArrowLeft')goPage(currentPage-1);
  }
});

var searchTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimer);
  var val=this.value;
  document.getElementById('search-clear').classList.toggle('visible',val.length>0);
  searchTimer=setTimeout(function(){currentSearch=document.getElementById('searchInput').value;currentPage=1;renderTab()},160);
});
document.getElementById('search-clear').addEventListener('click',function(){
  document.getElementById('searchInput').value='';
  this.classList.remove('visible');
  document.getElementById('nav-result-pill').classList.remove('visible');
  currentSearch='';currentPage=1;renderTab();document.getElementById('searchInput').focus();
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

loadData();
</script>
</body>
</html>
