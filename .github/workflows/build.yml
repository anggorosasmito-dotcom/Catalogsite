name: Convert Stock Data

on:
  push:
    paths:
      - 'stock_data.xlsx'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run converter
        run: python3 convert.py

      - name: Commit JSON output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/stock.json data/outlets.json
          git diff --cached --quiet || git commit -m "chore: update catalog data [$(date +'%Y-%m-%d %H:%M')]"
          git push
